name: CI

# Pipeline conforme à CLAUDE.md §14.2 :
# commit → lint → SAST → tests (>85%) → SCA → build → image scan → ...
# Cette étape couvre : lint, tests unitaires + couverture JaCoCo, SAST (Semgrep), SCA (OWASP DC).
# Le scan d'image conteneur et la signature Cosign sont déclenchés sur main/develop uniquement.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Empêche d'accumuler des runs concurrents sur la même branche.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: write          # nécessaire pour le commit auto du package-lock.json initial
  pull-requests: write
  security-events: write

jobs:
  build-test:
    name: Build, test & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify Maven wrapper presence
        run: |
          if [ -f mvnw ]; then echo "Using wrapper"; else echo "No wrapper, using system mvn"; fi
          mvn -v

      - name: Build & test (with JaCoCo coverage gate)
        run: mvn -B -ntp verify -DskipITs

      - name: Upload JaCoCo reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-reports
          path: |
            apps/*/target/site/jacoco/
            apps/*/target/jacoco.exec
          retention-days: 14

      - name: Upload Surefire reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: apps/*/target/surefire-reports/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Scan anti-secrets (§18.2.3 : aucun secret en clair). Historique COMPLET à
  # chaque run (fetch-depth 0) — rapide (~10 s pour 260+ commits) et attrape
  # aussi un secret introduit puis « supprimé » dans une même PR.
  # Binaire direct (pas gitleaks-action) : pas de licence requise, version pinnée.
  # ---------------------------------------------------------------------------
  secrets-scan:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks (full history)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks git --log-opts="--all" --redact -v

  sast-semgrep:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Semgrep officiel n'est pas exécuté sur les forks (pas d'accès SECRETS) — on saute proprement.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/owasp-top-ten
            p/java
            p/secrets
        # Pas de SARIF push automatique tant que GitHub Advanced Security n'est pas activé.
        continue-on-error: true

  sca-owasp:
    name: SCA (OWASP Dependency-Check)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Exécuté sur main/develop uniquement (lent à cause du téléchargement de la base NVD).
    # Désactivé tant que NVD_API_KEY n'est pas configuré dans les secrets repo (sinon
    # le téléchargement NVD échoue depuis les changements 2024 côté NIST).
    if: github.event_name == 'push' && vars.OWASP_DC_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # PAS de setup-java ici : l'action tourne dans son propre conteneur Docker
      # (Java embarqué) et hérite des env du job — un JAVA_HOME pointant vers le
      # toolcache de l'HÔTE casse le conteneur ("JAVA_HOME is not defined correctly").
      # Action pinnée (le @main avait changé de comportement entre deux runs).
      - name: Dependency-Check
        uses: dependency-check/Dependency-Check_Action@75ba02d6183445fe0761d26e836bde58b1560600 # 1.1.0
        with:
          project: qualitos
          path: '.'
          # Un seul format à la fois (l'action ne gère pas la liste fiablement) — HTML lisible
          # dans l'artefact uploadé. Pour SARIF, dupliquer l'étape avec format: SARIF.
          format: 'HTML'
          # Échoue le pipeline si une CVE >= 8.0 (haute/critique) est détectée — §11.1 OWASP A06.
          # --nvdApiKey est requis depuis le changement de quotas NVD en 2024.
          # https://nvd.nist.gov/developers/request-an-api-key
          # --disableNodeAudit : l'analyseur Node Audit (API npm audit) rejette les
          # locks contenant des ALIAS npm (string-width-cjs, strip-ansi-cjs… introduits
          # par l'arbre transitif de bpmn-js) -> « Invalid payload submitted to Node Audit
          # API » -> échec du job. L'API npm audit est par ailleurs dépréciée (auth requise).
          # La couverture JS reste assurée par RetireJS (--enableRetired) + le scan d'image
          # Trivy (web) + NVD. §11.1 OWASP A06.
          args: >-
            --failOnCVSS 8
            --enableRetired
            --disableNodeAudit
            --nvdApiKey ${{ secrets.NVD_API_KEY }}
            --suppression .dependency-check-suppressions.xml

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-dc-report
          path: reports/
          retention-days: 30

  frontend-build:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # NB: pas de condition sur les paths modifiés — la filter API
    # `github.event.pull_request.changed_files` est un compteur, pas une liste.
    # Si on voudra plus tard skipper sur les PR Java-only, utiliser dorny/paths-filter.

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: 'apps/web/.nvmrc'
          # Le cache npm exige un lockfile committé. Tant que apps/web/package-lock.json
          # n'existe pas dans le repo (bootstrap initial — install local impossible, cf.
          # ETIMEDOUT), on désactive le cache pour éviter l'erreur "Some specified paths
          # were not resolved". À ré-activer dans la PR suivante une fois le lockfile
          # généré par la CI et committé (cache: 'npm', cache-dependency-path: ...).

      # ----------------------------------------------------------------------
      # Garde-fou i18n (§15.1) : tout @@id marqué dans le code doit avoir son
      # entrée dans les tables scripts/i18n/*.py, et les XLF committés doivent
      # être à jour (régénérés). Échec rapide, avant npm install.
      # ----------------------------------------------------------------------
      - name: i18n cross-check (tables <-> code <-> XLF)
        shell: bash
        run: |
          python3 scripts/gen-i18n-xlf.py --check
          if ! git diff --exit-code -- src/locale; then
            echo "::error::XLF désynchronisés des tables — lancer 'python scripts/gen-i18n-xlf.py' et committer."
            exit 1
          fi

      - name: Install Chrome (for Karma headless tests)
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Print Chrome info
        shell: bash
        run: |
          which google-chrome || which chrome || which chromium-browser || true
          google-chrome --version || true
          echo "chrome-path=${{ steps.setup-chrome.outputs.chrome-path }}"

      - name: Detect lockfile state (avant install)
        id: lockfile
        shell: bash
        run: |
          if git ls-files --error-unmatch apps/web/package-lock.json > /dev/null 2>&1; then
            echo "tracked=true" >> "$GITHUB_OUTPUT"
            echo "Lockfile already tracked in git."
          else
            echo "tracked=false" >> "$GITHUB_OUTPUT"
            echo "Lockfile NOT tracked — install will generate it."
          fi

      - name: Install dependencies
        # Sortie directe dans le log du step (visible dans l'UI Actions).
        # Diagnostic prealable (versions + ls) pour eliminer les pistes triviales.
        run: |
          echo "==== diag ===="
          pwd
          npm --version
          node --version
          ls -la
          test -f package-lock.json && echo "lockfile: present ($(wc -c < package-lock.json) bytes)" || echo "lockfile: ABSENT"
          echo "==== install ===="
          # npm install (pas npm ci) : plus permissif, et 'npm ci' fail
          # mysterieusement en 1s contre le lockfile auto-genere (peer
          # deps + lockfileVersion 3 ?). Tradeoff : moins deterministe
          # mais debloque. Cf. tache de suivi #frontend-ci-strict.
          npm install --no-audit --no-fund --foreground-scripts

      # ----------------------------------------------------------------------
      # Auto-commit du package-lock.json lors du PREMIER run réussi sur develop.
      # Une fois committé, ce step devient no-op (lockfile.tracked=true).
      # Cf. CLAUDE.md §14.2 : reproductibilité builds via lockfile committé.
      # ----------------------------------------------------------------------
      - name: Commit package-lock.json (first run only)
        # if: doit etre une expression unique (pas un literal block). Le precedent
        # `if: |` cassait le parser YAML d'Actions, ce qui produisait un run avec
        # zero job sur le commit suivant. >- (folded scalar) joint les lignes en
        # une seule expression evaluable.
        if: >-
          steps.lockfile.outputs.tracked == 'false' &&
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')
        shell: bash
        run: |
          if [ ! -f package-lock.json ]; then
            echo "No package-lock.json generated, skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          BRANCH="${GITHUB_REF#refs/heads/}"
          # Message single-line (multi-line casserait le block scalar YAML car
          # les lignes du message ne seraient pas indentees au niveau du script).
          # [skip ci] dans le message coupe le trigger d'un nouveau run sur ce push.
          # Anti-loop redondant : aux runs suivants lockfile.tracked=true -> step skip.
          git commit -m "chore(web): commit CI-generated package-lock.json [skip ci]"
          git push origin "HEAD:${BRANCH}"

      - name: Build (production)
        run: |
          npm run build:prod 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo "::error::Build failed (exit $status). Tail of build.log:"
            tail -300 build.log
          fi
          exit "$status"

      - name: Upload build.log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: apps/web/build.log
          if-no-files-found: warn
          retention-days: 7

      - name: Tests (Chrome headless)
        shell: bash
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        # Bloquant depuis 2026-06-05 : le continue-on-error historique a masqué
        # une vraie régression (polyfill $localize absent de la config test).
        # La suite est verte en local (306/306) — un échec ici est un échec réel.
        run: |
          set -o pipefail
          npm test -- --reporters=progress,kjhtml --browsers=ChromeHeadlessCI 2>&1 | tee karma.log

      - name: Upload Karma reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: karma-reports
          path: |
            apps/web/coverage/
            apps/web/karma.log
          if-no-files-found: warn
          retention-days: 7

      - name: Dump Karma log inline (failure)
        if: failure()
        shell: bash
        run: |
          echo "============ KARMA LOG ============"
          tail -200 karma.log 2>/dev/null || echo "(no karma.log)"
          echo "============ END ============"

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/qualitos-web
          retention-days: 7

      # Permet de récupérer le lockfile généré par CI quand on l'a pas encore
      # commité (cas du bootstrap initial). Une fois commité, ce step devient
      # inutile mais reste sans danger (il ré-upload le même fichier).
      - name: Upload package-lock.json (for initial commit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-package-lock
          path: apps/web/package-lock.json
          if-no-files-found: warn
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Tests Python de l'ai-service (§14.3) — pytest + couverture >= 85 % (gate
  # dans pyproject.toml), lint ruff, contrats d'architecture import-linter.
  # Angle mort comblé : sans ce job, des tests cassés pouvaient atterrir sur
  # develop sans détection (cf. régression NLQ corrigée dans f699d50).
  # ---------------------------------------------------------------------------
  ai-service-tests:
    name: AI service tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: apps/ai-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        # 3.11 = version du runtime distroless (ADR 0013) — on teste sur la
        # même mineure que la prod, pas sur celle du poste de dev.
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: apps/ai-service/pyproject.toml

      - name: Install dependencies
        # `pip install .[dev]` est impossible : flat-layout avec plusieurs
        # packages top-level (setuptools refuse) — cf. ADR 0013. On installe
        # donc les dépendances explicitement, alignées sur
        # [project.dependencies] du pyproject.toml. Presidio et l'extra `ml`
        # sont volontairement exclus (lourds ; le filtre PII bascule sur
        # HeuristicPiiFilter, comportement prévu — même choix que l'image prod).
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            "fastapi>=0.115" \
            "uvicorn[standard]>=0.32" \
            "pydantic>=2.9" \
            "httpx>=0.27" \
            "sqlglot>=25.5" \
            "numpy>=1.26" \
            "pyjwt[crypto]>=2.9" \
            "python-multipart>=0.0.12" \
            "slowapi>=0.1.9" \
            "qdrant-client>=1.11" \
            "psycopg[binary]>=3.2" \
            "pytest>=8.3" "pytest-cov>=5.0" "pytest-asyncio>=0.24" \
            "import-linter>=2.0" "ruff>=0.6"

      - name: Lint (ruff)
        run: python -m ruff check .

      - name: Architecture contracts (import-linter)
        # Vérifie les contrats Clean Architecture du pyproject.toml
        # (domain sans framework, application sans infra/presentation).
        run: lint-imports

      - name: Tests + coverage gate (>= 85 %)
        # Le gate de couverture vient de [tool.coverage.report] fail_under=85.
        run: python -m pytest

  # ---------------------------------------------------------------------------
  # Scan d'images conteneur (§14.2 ; règle §18.2.1 : aucune CVE Critique/Haute).
  # Build Docker + Trivy, uniquement sur push main/develop (étape lourde).
  # ignore-unfixed : ne bloque pas sur les CVE sans correctif disponible amont.
  # ---------------------------------------------------------------------------
  image-scan:
    name: Image scan (Trivy)
    runs-on: ubuntu-latest
    # 50 min : l'image web compile désormais les 6 locales (AOT ×6, ~15-20 min
    # de build Docker) avant le scan.
    timeout-minutes: 50
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-core
            context: .
            dockerfile: apps/api-core/Dockerfile
          - service: api-quality-engine
            context: .
            dockerfile: apps/api-quality-engine/Dockerfile
          - service: api-iot-hub
            # Contexte racine : pom hérité de qualitos-parent + dep industry-commons.
            context: .
            dockerfile: apps/api-iot-hub/Dockerfile
          - service: ai-service
            context: apps/ai-service
            dockerfile: apps/ai-service/Dockerfile
          - service: web
            context: apps/web
            dockerfile: apps/web/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: >
          docker build
          -t qualitos/${{ matrix.service }}:ci
          -f ${{ matrix.dockerfile }}
          ${{ matrix.context }}

      - name: Trivy scan (fail on CRITICAL/HIGH)
        # NB : les tags de cette action sont préfixés 'v' (v0.36.0) — '0.24.0' n'existe pas.
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: qualitos/${{ matrix.service }}:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          # Exceptions time-boxées (CVE distroless en attente de rebuild Google) —
          # chaque entrée est motivée et datée dans le fichier.
          trivyignores: .trivyignore
        env:
          # ghcr.io rate-limite les pulls anonymes de la DB Trivy quand les 5 jobs
          # de la matrice la téléchargent en parallèle (TOO MANY REQUESTS) →
          # repli sur le miroir ECR public, ghcr en secours.
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1,ghcr.io/aquasecurity/trivy-java-db:1

  # ---------------------------------------------------------------------------
  # E2E smoke (§14.3) — Playwright sur la SPA en configuration 'e2e'
  # (useMockApi=true, authMode=dev) : zéro backend requis. Valide le shell,
  # le routing lazy et le rendu des features clés.
  # ---------------------------------------------------------------------------
  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version-file: 'apps/web/.nvmrc'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npm run e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # DAST (OWASP ZAP) — §14.2 « DAST (OWASP ZAP) », §14.3, DoD §20.
  #
  # Démarre une stack MINIMALE éphémère (Postgres + api-quality-engine, sans
  # Keycloak — cf. docker-compose.dast.yml), attend /actuator/health=UP, puis
  # lance deux scans ZAP :
  #   1. BASELINE (passif, spider léger) sur la racine HTTP de l'engine.
  #   2. API SCAN (actif, ciblé) sur la spec OpenAPI /v3/api-docs.
  # Seuil d'échec : FAIL sur HIGH (option -l côté action), WARN sur MEDIUM. Les
  # faux positifs sont gérés dans .zap/rules.tsv (motivés + datés).
  #
  # 100 % autonome : aucune dépendance à un secret repo (images publiques
  # zaproxy/* + ghcr.io/zaproxy/action-*). S'exécute sur les push main/develop
  # ET sur les PR internes (pas les forks : pas de Docker build lourd inutile et
  # cohérent avec image-scan). Voir docs/runbooks/dast-owasp-zap.md.
  # ---------------------------------------------------------------------------
  dast-zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    # Pas sur les forks (build Docker de l'engine = lourd, et le scan n'apporte
    # rien sur une PR externe avant revue). Push main/develop + PR du repo.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & start DAST stack (Postgres + api-quality-engine)
        run: |
          docker compose -f docker-compose.dast.yml up -d --build

      - name: Wait for engine health (/actuator/health = UP)
        run: |
          set -euo pipefail
          echo "Attente du démarrage de api-quality-engine (max 5 min)…"
          for i in $(seq 1 60); do
            body="$(curl -fsS http://localhost:8092/actuator/health 2>/dev/null || true)"
            if echo "$body" | grep -q '"status":"UP"'; then
              echo "Engine UP après ${i} tentatives."
              echo "$body"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Engine non disponible après 5 min — dump des logs :"
          docker compose -f docker-compose.dast.yml logs --no-color api-quality-engine-dast | tail -200
          exit 1

      - name: Smoke OpenAPI endpoint (/v3/api-docs)
        run: |
          set -euo pipefail
          code="$(curl -s -o /tmp/openapi.json -w '%{http_code}' http://localhost:8092/v3/api-docs)"
          echo "GET /v3/api-docs -> HTTP $code ($(wc -c < /tmp/openapi.json) octets)"
          test "$code" = "200"

      # --- Scan API (actif, ciblé OpenAPI) -----------------------------------
      # On ne scanne QUE l'API via sa spec OpenAPI : la racine HTTP renvoie 401
      # (auth requise) — un baseline/spider y est inutile et échoue (« spider error
      # 401 expected 200 »). fail_action:false car l'action zaproxy échoue sinon sur
      # TOUTE alerte (WARN/MEDIUM compris), ce qui n'est PAS la politique voulue
      # (§14.2 / DoD §20 : bloquer sur HIGH/critique uniquement) ; l'étape « gate »
      # plus bas n'échoue QUE sur riskcode=3 (HIGH). NE PAS surcharger -J : l'action
      # écrit son rapport par défaut (report_json.json) et le relit ensuite ; un nom
      # custom casse l'action (« report_json.json does not exist »).
      # allow_issue_writing:false : pas de création d'issue GitHub.
      - name: ZAP API scan (OpenAPI /v3/api-docs)
        uses: zaproxy/action-api-scan@v0.9.0
        with:
          target: 'http://localhost:8092/v3/api-docs'
          format: openapi
          rules_file_name: '.zap/rules.tsv'
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-api-scan-report

      # --- Gate : échec UNIQUEMENT sur alerte de risque HIGH (riskcode=3) ------
      # Politique §14.2 : bloque sur HIGH/critique, laisse passer MEDIUM/LOW (WARN),
      # visibles dans l'artefact. jq parcourt récursivement le rapport JSON ZAP.
      - name: Gate — échec seulement sur alerte HIGH
        run: |
          set -euo pipefail
          f="$(find . -maxdepth 3 -name 'report_json.json' 2>/dev/null | head -1)"
          if [ -z "$f" ]; then
            echo "::warning::Rapport ZAP report_json.json introuvable — gate HIGH non évaluable (voir l'artefact zap-api-scan-report)."
            exit 0
          fi
          high="$(jq '[.. | objects | select(.riskcode? == "3")] | length' "$f" 2>/dev/null || echo 0)"
          echo "Rapport : $f — alertes ZAP de risque HIGH : ${high}"
          if [ "$high" -gt 0 ]; then
            echo "::error::${high} alerte(s) ZAP de risque HIGH détectée(s) — voir l'artefact zap-api-scan-report."
            exit 1
          fi
          echo "Aucune alerte HIGH. Les WARN/MEDIUM sont rapportés (non bloquants)."

      - name: Tear down DAST stack
        if: always()
        run: |
          docker compose -f docker-compose.dast.yml logs --no-color > dast-stack.log 2>&1 || true
          docker compose -f docker-compose.dast.yml down -v || true

      - name: Upload DAST stack log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-stack-log
          path: dast-stack.log
          if-no-files-found: warn
          retention-days: 7
