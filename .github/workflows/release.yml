name: Release

# Déclenchement : push d'un tag sémantique vX.Y.Z sur main.
# 1) JARs + SBOM SPDX → release GitHub.
# 2) Images conteneur → scan Trivy (bloquant) → push GHCR → signature Cosign
#    keyless (OIDC GitHub) + SBOM d'image attaché en attestation. §14.2, §18.2.6.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write
  packages: write
  id-token: write   # signature Cosign keyless (OIDC)

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/qualitos

jobs:
  build:
    name: Build & publish artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B -ntp package -DskipTests

      - name: Generate SBOM (SPDX) via CycloneDX
        run: mvn -B -ntp org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          find apps -path '*/target/*.jar' -not -name '*sources*' -not -name '*javadoc*' \
            -exec cp {} release-artifacts/ \;
          find . -name 'bom.json' -path '*/target/*' \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  images:
    name: Images — scan, push & sign (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-core
            context: .
            dockerfile: apps/api-core/Dockerfile
          - service: api-quality-engine
            context: .
            dockerfile: apps/api-quality-engine/Dockerfile
          - service: api-iot-hub
            context: apps/api-iot-hub
            dockerfile: apps/api-iot-hub/Dockerfile
          - service: ai-service
            context: apps/ai-service
            dockerfile: apps/ai-service/Dockerfile
          - service: web
            context: apps/web
            dockerfile: apps/web/Dockerfile
          - service: blockchain-service
            context: apps/blockchain-service
            dockerfile: apps/blockchain-service/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: >
          docker build
          -t "$IMAGE_PREFIX/${{ matrix.service }}:${{ steps.meta.outputs.version }}"
          -f ${{ matrix.dockerfile }}
          ${{ matrix.context }}

      # Règle §18.2.6 : aucun déploiement sans scan vert. Le push n'a lieu
      # que si Trivy ne trouve aucune CVE Critique/Haute corrigeable.
      - name: Trivy scan (blocking)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ steps.meta.outputs.version }}
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          # Exceptions time-boxées (CVE distroless en attente de rebuild Google).
          trivyignores: .trivyignore
        env:
          # Repli miroir ECR public — ghcr.io rate-limite les pulls anonymes de la
          # DB quand la matrice la télécharge en parallèle (TOO MANY REQUESTS).
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2,ghcr.io/aquasecurity/trivy-db:2
          TRIVY_JAVA_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-java-db:1,ghcr.io/aquasecurity/trivy-java-db:1

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        id: push
        run: |
          IMAGE="$IMAGE_PREFIX/${{ matrix.service }}:${{ steps.meta.outputs.version }}"
          docker push "$IMAGE"
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE")
          echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      # Signature keyless : l'identité OIDC du workflow GitHub est consignée
      # dans Rekor (transparence). Vérification :
      #   cosign verify --certificate-identity-regexp '.*github.com/.*/qualitos.*' \
      #     --certificate-oidc-issuer https://token.actions.githubusercontent.com <image>
      - name: Sign image (Cosign keyless)
        run: cosign sign --yes "${{ steps.push.outputs.digest }}"

      - name: Generate image SBOM (SPDX) & attest
        run: |
          docker run --rm anchore/syft:v1.18.1 "${{ steps.push.outputs.digest }}" -o spdx-json > sbom-${{ matrix.service }}.spdx.json
          cosign attest --yes --predicate sbom-${{ matrix.service }}.spdx.json --type spdxjson "${{ steps.push.outputs.digest }}"
