name: Release

# Déclenchement : push d'un tag sémantique vX.Y.Z sur main.
# Construit les JARs des modules, génère un SBOM SPDX et crée la release GitHub.
# La signature Cosign + push d'images conteneur est ajoutée quand le registre sera défini.

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  build:
    name: Build & publish artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B -ntp package -DskipTests

      - name: Generate SBOM (SPDX) via CycloneDX
        run: mvn -B -ntp org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts
          find apps -path '*/target/*.jar' -not -name '*sources*' -not -name '*javadoc*' \
            -exec cp {} release-artifacts/ \;
          find . -name 'bom.json' -path '*/target/*' \
            -exec cp {} release-artifacts/ \;
          ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
