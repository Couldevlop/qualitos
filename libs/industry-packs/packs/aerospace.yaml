pack_id: aerospace
version: 1.0.0
name: Aerospace, Space & Defense
sectors: [aerospace, space, defense]
norms:
  - as9100
  - iso-9001
  - iso-14001
  - iso-45001
kpis:
  - kpi_id: aero_escape_rate_ppm
    name: Escape Rate (PPM)
    category: customer-quality
    formula: "SUM(defects_at_customer) / SUM(parts_delivered) * 1000000"
    unit: "PPM"
    target: "< 10"
    threshold_warning: "10 - 50"
    threshold_critical: "> 50"
    data_source: capa_customer
    refresh_frequency: weekly
    owner: quality_director
    applicable_industries: [aerospace]
    related_kpis: []
    explainability: "KPI Airbus/Boeing. Aligné AS9100D §10.2.1.1. Cible escape rate Tier 1 < 10 PPM."
  - kpi_id: aero_fai_pass_rate
    name: First Article Inspection (FAI) Pass Rate
    category: project-execution
    formula: "COUNT(fai_passed_first_submission) / COUNT(fai_submitted) * 100"
    unit: "%"
    target: ">= 90"
    threshold_warning: "75 - 90"
    threshold_critical: "< 75"
    data_source: fai_records
    refresh_frequency: monthly
    owner: engineering_lead
    applicable_industries: [aerospace]
    related_kpis: []
    explainability: "Mesure conformité AS9102 §8.5.1.3."
  - kpi_id: aero_fod_findings
    name: Findings FOD par mois
    category: compliance-audit
    formula: "COUNT(fod_findings) WHERE date >= NOW() - INTERVAL 30 DAY"
    unit: "count"
    target: "0"
    threshold_warning: "1 - 3"
    threshold_critical: "> 3"
    data_source: audit_5s_findings
    refresh_frequency: daily
    owner: fod_manager
    applicable_industries: [aerospace]
    related_kpis: []
    explainability: "Programme FOD AS9100D §8.1.4 — tolérance zéro pour zones critiques."
  - kpi_id: aero_supplier_otd
    name: Supplier On-Time Delivery
    category: supply-chain
    formula: "COUNT(po_lines_delivered_on_or_before_due) / COUNT(po_lines_delivered) * 100"
    unit: "%"
    target: ">= 98"
    threshold_warning: "92 - 98"
    threshold_critical: "< 92"
    data_source: supplier_deliveries
    refresh_frequency: weekly
    owner: supply_chain_manager
    applicable_industries: [aerospace, defense]
    related_kpis: []
    explainability: "Exigence Airbus/Safran/Dassault."
  - kpi_id: aero_counterfeit_block_rate
    name: Counterfeit Parts Block Rate
    category: risk
    formula: "COUNT(suspected_counterfeit_intercepted) / COUNT(receiving_inspections) * 100"
    unit: "%"
    target: "tracking only (escalate >0)"
    threshold_warning: "any > 0"
    threshold_critical: "any in critical part"
    data_source: receiving_inspections
    refresh_frequency: realtime
    owner: quality_director
    applicable_industries: [aerospace, defense]
    related_kpis: []
    explainability: "AS9100D §8.1.2 — tout cas escalade direction + autorité réglementaire."
  - kpi_id: aero_nadcap_audits_passed
    name: NADCAP Special Process Audit Pass Rate
    category: compliance-audit
    formula: "COUNT(nadcap_audits_passed) / COUNT(nadcap_audits_executed) * 100"
    unit: "%"
    target: "100"
    threshold_warning: "below 100"
    threshold_critical: "fail"
    data_source: audit_external
    refresh_frequency: per-audit
    owner: special_process_owner
    applicable_industries: [aerospace, defense]
    related_kpis: []
    explainability: "Procédés spéciaux AS9100D §8.5.1.2."
glossary:
  - {term: FAI, definition: "First Article Inspection — AS9102 Rev B"}
  - {term: FOD, definition: "Foreign Object Debris"}
  - {term: NADCAP, definition: "National Aerospace and Defense Contractors Accreditation Program"}
  - {term: OCM, definition: "Original Component Manufacturer"}
  - {term: OASIS, definition: "Online Aerospace Supplier Information System (IAQG)"}
  - {term: PDR, definition: "Preliminary Design Review"}
  - {term: CDR, definition: "Critical Design Review"}
connectors_required:
  - sap-erp
  - mes-generic
  - plm-windchill
  - opc-ua
ishikawa_templates:
