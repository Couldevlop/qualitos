      method: ["FMEA orienté safety non mise à jour"]
      measurement: ["Indicateurs sécurité non monitorés"]
      environment: []
  - problem_archetype: "Échec audit OASIS / surveillance IAQG"
    branches:
      man: []
      machine: []
      material: []
      method: ["Action corrective audit précédent non close"]
      measurement: []
      environment: []
  - problem_archetype: "Délai livraison Airbus / Safran dépassé"
    branches:
      man: []
      machine: ["Capacité machine saturée"]
      material: ["Rupture matière sur source unique"]
      method: ["Pas de plan de contingence (§6.1.2.3)"]
      measurement: []
      environment: []
poka_yoke_library:
  - id: poka-yoke-aero-001
    name: Tool tethering obligatoire altitude
    description: "Lanyards tous outils en zone montage altitude"
    sector_fit: [aerospace, space]
  - id: poka-yoke-aero-002
    name: Shadow board avec compteur photoélectrique
    description: "Détection outil manquant immédiate par cellule photo"
    sector_fit: [aerospace, defense, manufacturing]
  - id: poka-yoke-aero-003
    name: Vision IA détection FOD pré-fermeture cellule
    description: "Caméra YOLOv8 fine-tunée détecte corps étrangers avant fermeture"
    sector_fit: [aerospace, space]
  - id: poka-yoke-aero-004
    name: Verrouillage cellule procédé spécial si NADCAP expirée
    description: "Système refuse démarrage cycle si certification opérateur ou re-qualification NADCAP expirée"
    sector_fit: [aerospace, defense]
training_paths:
