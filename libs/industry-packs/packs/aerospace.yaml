    modules: [as9100-intro, fai-as9102, fod-prevention, counterfeit-awareness]
  - role: assembler
    modules: [fod-awareness, tool-control, configuration-mgmt]
  - role: supplier_quality_engineer
    modules: [as9100-supplier-mgmt, nadcap-fundamentals, counterfeit-detection]
documents_templates:
