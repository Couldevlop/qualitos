pack_id: pharma
version: 1.0.0
name: Pharmaceutical & Medical Devices (GxP)
sectors: [pharma, medical_devices, biotech, life_sciences]
norms:
  - iso-13485
  - fda-21-cfr-part-11
  - iso-9001
  - iso-14971
kpis:
  - kpi_id: pharma_batch_right_first_time
    name: Batch Right First Time
    category: production-quality
    formula: "COUNT(batches_released_without_deviation) / COUNT(batches_produced) * 100"
    unit: "%"
    target: ">= 95"
    threshold_warning: "85 - 95"
    threshold_critical: "< 85"
    data_source: batch_records
    refresh_frequency: daily
    owner: production_manager
    applicable_industries: [pharma]
    related_kpis: [pharma_deviation_rate]
    explainability: "KPI cGMP standard. Aligné ICH Q10."
  - kpi_id: pharma_deviation_rate
    name: Deviation Rate per Batch
    category: production-quality
    formula: "COUNT(deviations) / COUNT(batches_produced)"
    unit: "ratio"
    target: "< 0.5"
    threshold_warning: "0.5 - 1.0"
    threshold_critical: "> 1.0"
    data_source: deviation_records
    refresh_frequency: daily
    owner: qa_manager
    applicable_industries: [pharma]
    related_kpis: [pharma_oos_rate]
    explainability: "Inclut déviations planifiées et imprévues."
  - kpi_id: pharma_oos_rate
    name: Out of Specification (OOS) Rate
    category: laboratory
    formula: "COUNT(oos_results_confirmed) / COUNT(tests_performed) * 100"
    unit: "%"
    target: "< 1.0"
    threshold_warning: "1.0 - 2.5"
    threshold_critical: "> 2.5"
    data_source: lab_test_results
    refresh_frequency: daily
    owner: qc_manager
    applicable_industries: [pharma]
    related_kpis: []
    explainability: "Aligné FDA OOS Guidance. Investigation phase IB obligatoire."
  - kpi_id: pharma_capa_part11_aging
    name: 21 CFR Part 11 CAPA — Aging > 30 days
    category: compliance-audit
    formula: "COUNT(capa_open) WHERE source='part-11-finding' AND opened_at < NOW() - INTERVAL 30 DAY"
    unit: "count"
    target: "0"
    threshold_warning: "1 - 3"
    threshold_critical: "> 3"
    data_source: capa_events
    refresh_frequency: daily
    owner: compliance_officer
    applicable_industries: [pharma, medical_devices]
    related_kpis: []
    explainability: "Tracking compliance Part 11 — éviter Form 483 FDA."
  - kpi_id: pharma_batch_release_time
    name: Batch Release Cycle Time
    category: efficiency
    formula: "AVG(released_at - last_test_completed_at) in hours"
    unit: "hours"
    target: "< 48"
    threshold_warning: "48 - 72"
    threshold_critical: "> 72"
    data_source: batch_records
    refresh_frequency: weekly
    owner: qp_manager
    applicable_industries: [pharma]
    related_kpis: []
    explainability: "Délai revue QP (Qualified Person) → libération lot."
  - kpi_id: medical_device_vigilance_incidents
    name: Vigilance Incidents Reported / Quarter
    category: post-market
    formula: "COUNT(incidents) WHERE reported_at >= NOW() - INTERVAL 90 DAY"
    unit: "count"
    target: "tracking only"
    threshold_warning: "trend up"
    threshold_critical: "serious incident"
    data_source: vigilance_records
    refresh_frequency: weekly
    owner: vigilance_manager
    applicable_industries: [medical_devices]
    related_kpis: []
    explainability: "Suivi PMS ISO 13485 §8.2.1. Tout incident grave → notification autorité."
glossary:
  - {term: cGMP, definition: "current Good Manufacturing Practices — 21 CFR 210/211 / EU Annex 1"}
  - {term: CSV, definition: "Computer System Validation — GAMP 5"}
  - {term: IQ, definition: "Installation Qualification"}
  - {term: OQ, definition: "Operational Qualification"}
  - {term: PQ, definition: "Performance Qualification"}
  - {term: UDI, definition: "Unique Device Identifier (FDA/EUDAMED)"}
  - {term: DMR, definition: "Device Master Record (ISO 13485 §4.2.3)"}
  - {term: DHR, definition: "Device History Record"}
  - {term: PSUR, definition: "Periodic Safety Update Report (MDR Art. 86)"}
  - {term: OOS, definition: "Out of Specification (laboratory result)"}
  - {term: QP, definition: "Qualified Person (EU GMP) — pharmacien responsable libération"}
connectors_required:
  - hl7-fhir
  - lims
  - sap-erp
  - opc-ua
  - mes-pharma
