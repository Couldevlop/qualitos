      measurement: ["Sonde T° non étalonnée"]
      environment: ["Salle propre — particules > limite"]
  - problem_archetype: "Résultat OOS analytique"
    branches:
      man: ["Analyste non qualifié méthode"]
      machine: ["HPLC dérive baseline"]
      material: ["Standard étalon dégradé"]
      method: ["Méthode non validée pour matrice"]
      measurement: ["Étalonnage périmé"]
      environment: ["Variation T° labo"]
