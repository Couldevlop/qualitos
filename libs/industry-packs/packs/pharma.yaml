  - problem_archetype: "Transfer de conception R&D → production échoué"
    branches:
      man: ["R&D pas associée transfert"]
      machine: ["Équipement production différent prototype"]
      material: ["Substitution matière non revue"]
      method: ["Procédure transfert (§7.3.7) non suivie"]
      measurement: []
