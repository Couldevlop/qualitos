poka_yoke_library:
  - id: poka-yoke-pharma-001
    name: Verrouillage cycle si étalonnage capteur expiré (GxP)
    description: "Système ne démarre cycle si sonde critique hors période étalonnage"
    sector_fit: [pharma, medical_devices]
  - id: poka-yoke-pharma-002
    name: 2FA obligatoire e-signature 21 CFR Part 11
    description: "Aucune signature GxP sans 2FA TOTP ou WebAuthn"
    sector_fit: [pharma, medical_devices]
  - id: poka-yoke-pharma-003
    name: Vérification UDI scan avant libération
    description: "Lecteur 2D scan UDI vs base BDD avant validation libération lot"
    sector_fit: [medical_devices]
  - id: poka-yoke-pharma-004
    name: Audit trail append-only (DB triggers)
    description: "Triggers PostgreSQL refusent UPDATE/DELETE sur tables audit"
    sector_fit: [pharma, medical_devices, banking]
training_paths:
  - role: qa_officer
    modules: [iso-13485-intro, 21-cfr-part-11, vigilance-procedures, capa-pharma]
  - role: production_operator
    modules: [cgmp-fundamentals, sop-execution, deviation-reporting]
  - role: qp_pharmacist
    modules: [batch-release-eu, oos-investigation, change-control]
  - role: r&d_engineer
    modules: [design-controls-iso13485, design-transfer, risk-iso14971]
documents_templates:
  - /standards/templates/iso-13485/device-master-record.md
  - /standards/templates/iso-13485/procedure-vigilance.md
  - /standards/templates/iso-13485/plan-gestion-risque.md
  - /standards/templates/fda-21-cfr-part-11/validation-master-plan.md
  - /standards/templates/fda-21-cfr-part-11/audit-trail-review-procedure.md
  - /standards/templates/fda-21-cfr-part-11/politique-esignature.md
processes_templates:
