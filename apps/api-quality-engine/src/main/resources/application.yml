spring:
  application:
    name: api-quality-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qualitos_quality}
    username: ${DB_USER:qualitos}
    password: ${DB_PASSWORD:qualitos}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Socle Kafka (§10.1) — producteur String. Le KafkaTemplate auto-configuré est
  # paresseux : sans broker joignable il ne casse rien tant que le relais (off par
  # défaut) ne publie pas. Broker dev = profil compose 'kafka' (Redpanda).
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  jpa:
    hibernate:
      # 'none' au lieu de 'validate': Flyway est la source de verite du schema.
      # 'validate' generait des faux positifs sur @Lob String (Postgres attend
      # oid alors que les migrations Flyway creent TEXT, qui est preferable).
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
    open-in-view: false
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          # En dev, le browser issu via http://localhost:8080 alors qu'api-quality-engine
          # joint Keycloak via http://keycloak:8080 (DNS Docker). Utiliser
          # jwk-set-uri seul (pas issuer-uri) court-circuite la validation
          # stricte de l'issuer claim — la signature reste verifiee.
          jwk-set-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:qualitos}/protocol/openid-connect/certs

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  port: 8082
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        # OWASP A05 : exposition minimale — pas d'env/heapdump/loggers.
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        # SLO §20 : p95 API < 300 ms — buckets alignés pour les alertes Prometheus.
        http.server.requests: 100ms,300ms,800ms

logging:
  level:
    com.openlab.qualitos: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{tenantId:-no-tenant}] %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Passerelle IA (ai-service) — ADR 0014. Entièrement paramétrable par variables d'env.
qualitos:
  # Relais Kafka outbox (audit_events → topic). OFF par défaut = aucun changement de
  # comportement (le bean AuditEventKafkaRelay n'est même pas créé). §10.1, §13.2.
  kafka:
    enabled: ${QUALITOS_KAFKA_ENABLED:false}
    topic: ${QUALITOS_KAFKA_TOPIC:qualitos.audit-events}
    consumer-group: ${QUALITOS_KAFKA_CONSUMER_GROUP:qualitos-activity-feed}
    webhooks-consumer-group: ${QUALITOS_KAFKA_WEBHOOKS_GROUP:qualitos-webhooks}
    batch-size: ${QUALITOS_KAFKA_BATCH_SIZE:200}
    initial-delay-ms: ${QUALITOS_KAFKA_INITIAL_DELAY_MS:30000}
    fixed-delay-ms: ${QUALITOS_KAFKA_FIXED_DELAY_MS:10000}
  ai:
    base-url: ${AI_SERVICE_URL:http://localhost:8085}
    # Timeouts du client HTTP vers ai-service (ms). Le read-timeout DOIT rester
    # supérieur à OLLAMA_TIMEOUT_S (ai-service), lui-même supérieur à la latence du
    # modèle. Pour un modèle plus lent/précis sur CPU (ex. qualitos-sql-lite),
    # relever de concert AI_READ_TIMEOUT_MS et OLLAMA_TIMEOUT_S — aucun code à changer.
    connect-timeout-ms: ${AI_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${AI_READ_TIMEOUT_MS:260000}
    # Garde-fous du chemin LLM (OWASP LLM04 — Model DoS), cloisonnés par tenant.
    # Tout est paramétrable par variable d'env, sans toucher au code (§18.2-9).
    guard:
      enabled: ${AI_GUARD_ENABLED:true}
      requests-per-minute: ${AI_GUARD_RPM:20}
      daily-quota: ${AI_GUARD_DAILY_QUOTA:500}
      max-prompt-chars: ${AI_GUARD_MAX_PROMPT_CHARS:20000}
      circuit-failure-threshold: ${AI_GUARD_CIRCUIT_FAILURES:5}
      circuit-open-seconds: ${AI_GUARD_CIRCUIT_OPEN_SECONDS:30}
  blockchain:
    # Client vers blockchain-service (actif sous le profil "fabric" ; ADR 0012 Phase B).
    service-url: ${BLOCKCHAIN_SERVICE_URL:http://localhost:8090}
    connect-timeout-ms: ${BLOCKCHAIN_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${BLOCKCHAIN_READ_TIMEOUT_MS:30000}
