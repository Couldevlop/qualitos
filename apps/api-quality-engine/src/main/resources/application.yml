spring:
  application:
    name: api-quality-engine

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/qualitos_quality}
    username: ${DB_USER:qualitos}
    password: ${DB_PASSWORD:qualitos}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      # 'none' au lieu de 'validate': Flyway est la source de verite du schema.
      # 'validate' generait des faux positifs sur @Lob String (Postgres attend
      # oid alors que les migrations Flyway creent TEXT, qui est preferable).
      ddl-auto: none
    properties:
      hibernate:
        default_schema: public
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
          order_inserts: true
          order_updates: true
    open-in-view: false
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_URL:http://localhost:8080}/realms/${KEYCLOAK_REALM:qualitos}

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    web:
      pageable:
        default-page-size: 20
        max-page-size: 100

server:
  port: 8082
  servlet:
    context-path: /
  error:
    include-message: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.openlab.qualitos: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{tenantId:-no-tenant}] %logger{36} - %msg%n"

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
