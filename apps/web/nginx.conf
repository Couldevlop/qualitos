# Négociation de langue : mappe l'en-tête Accept-Language vers une locale servie.
# Ce fichier est inclus dans conf.d/ (contexte http) → `map` est légal ici, en
# tête de fichier, avant le bloc server{}.
#
# Accept-Language est une liste pondérée (ex. "fr-CH,fr;q=0.9,en;q=0.8"). Un match
# « commence par » sur la première langue listée couvre l'écrasante majorité des
# cas et reste lisible. Les variantes régionales (fr-CA, en-US, zh-Hans…) sont
# captées par le préfixe de 2 lettres. Défaut : fr (locale source).
map $http_accept_language $qos_locale {
  default        fr;
  ~*^en          en;
  ~*^es          es;
  ~*^ar          ar;
  ~*^ja          ja;
  ~*^zh          zh;
  # Filets de secours non ancrés (priorité faible : n'agissent que si la 1re langue
  # n'a pas matché ci-dessus) pour les en-têtes où fr n'est pas en tête.
  ~*[,\ ]en      en;
  ~*[,\ ]es      es;
  ~*[,\ ]ar      ar;
  ~*[,\ ]ja      ja;
  ~*[,\ ]zh      zh;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Headers de sécurité (CLAUDE.md §11.1 — OWASP Secure Headers).
  # `always` : émis aussi sur les réponses 3xx/4xx/5xx (donc sur les redirections
  # de négociation ci-dessous). Ces add_header au niveau server{} sont hérités par
  # tout location/if qui ne définit PAS son propre add_header (règle d'héritage nginx).
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
  # CSP minimale ; à raffiner quand l'inventaire des origines (Keycloak, API) est figé.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' http://localhost:8080 http://localhost:8181 http://localhost:8082;" always;

  # Compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/x-javascript text/xml application/xml application/xml+rss text/javascript;
  gzip_min_length 1024;

  # Favicon non present : retourne 204 No Content pour eviter les 404 bruyants.
  location = /favicon.ico { return 204; access_log off; log_not_found off; }

  # Négociation de langue UNIQUEMENT à la racine exacte.
  # 302 (pas 301) : la préférence de l'utilisateur peut changer entre deux visites.
  location = / { return 302 /$qos_locale/; }

  # ---------------------------------------------------------------------------
  # Un bloc par locale : fallback SPA PAR LOCALE (chaque build a son propre
  # index.html et son <base href="/<locale>/">). On NE renvoie jamais vers un
  # index.html d'une autre locale.
  # ---------------------------------------------------------------------------
  location /fr/ { try_files $uri $uri/ /fr/index.html; }
  location /en/ { try_files $uri $uri/ /en/index.html; }
  location /es/ { try_files $uri $uri/ /es/index.html; }
  location /ar/ { try_files $uri $uri/ /ar/index.html; }
  location /ja/ { try_files $uri $uri/ /ja/index.html; }
  location /zh/ { try_files $uri $uri/ /zh/index.html; }

  # Cache long pour les bundles hashés (immutable). Placé avant le fallback
  # générique pour que les assets ne tombent pas dans la redirection.
  # Exclut volontairement index.html et ngsw.json (gérés ci-dessous en no-cache).
  location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
    # add_header local : il faut ré-émettre les headers de sécurité, l'héritage
    # nginx étant remplacé (et non fusionné) dès qu'un add_header existe ici.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    try_files $uri =404;
  }

  # index.html et manifeste du service worker : jamais en cache long, sinon les
  # déploiements ne se propagent pas (ngsw.json pilote la mise à jour du SW).
  location ~* /(index\.html|ngsw\.json|ngsw-worker\.js)$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    try_files $uri =404;
  }

  # Routes profondes héritées SANS préfixe de locale (favoris existants
  # /dashboard, /standards…). Dernier recours : redirige vers fr en conservant
  # le chemin et la query string. 302 (pas 301) pour ne pas figer le choix.
  location / {
    return 302 /fr$request_uri;
  }
}
