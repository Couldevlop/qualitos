<qos-form-dialog
  i18n-title="@@fmea.edit.title"
  title="Modifier le projet FMEA"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@common.name">Nom</mat-label>
    <input matInput formControlName="name" maxlength="250" required>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@fmea.create.scope">Périmètre</mat-label>
    <textarea matInput formControlName="scope" rows="3" maxlength="1000"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@fmea.create.rpn-threshold">Seuil RPN critique</mat-label>
    <input matInput formControlName="criticalRpnThreshold" type="number" min="1" max="1000" required>
  </mat-form-field>

</qos-form-dialog>
