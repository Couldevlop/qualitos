<qos-form-dialog
  title="Nouveau projet FMEA"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Créer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <div class="row">
    <mat-form-field appearance="outline" class="col col-code">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code" maxlength="120" required
             placeholder="Ex. : PFMEA-ASM-A">
      <mat-hint>A-Z, 0-9, point, tiret, underscore</mat-hint>
    </mat-form-field>
    <mat-form-field appearance="outline" class="col">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type" required>
        <mat-option *ngFor="let t of types" [value]="t.value">{{ t.label }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Nom</mat-label>
    <input matInput formControlName="name" maxlength="250" required>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Périmètre</mat-label>
    <textarea matInput formControlName="scope" rows="3" maxlength="1000"
              placeholder="Décrivez le périmètre de l'analyse"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Seuil RPN critique</mat-label>
    <input matInput formControlName="criticalRpnThreshold" type="number" min="1" max="1000" required>
    <mat-hint>RPN = Sévérité × Occurrence × Détection. Items ≥ seuil = CRITIQUES.</mat-hint>
  </mat-form-field>

</qos-form-dialog>
