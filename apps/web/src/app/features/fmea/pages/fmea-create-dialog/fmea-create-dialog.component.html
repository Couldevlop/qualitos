<qos-form-dialog
  i18n-title="@@fmea.create.title"
  title="Nouveau projet FMEA"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  i18n-submitLabel="@@common.create"
  submitLabel="Créer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <div class="row">
    <mat-form-field appearance="outline" class="col col-code">
      <mat-label i18n="@@fmea.create.code">Code</mat-label>
      <input matInput formControlName="code" maxlength="120" required
             i18n-placeholder="@@fmea.create.code-placeholder"
             placeholder="Ex. : PFMEA-ASM-A">
      <mat-hint i18n="@@fmea.create.code-hint">A-Z, 0-9, point, tiret, underscore</mat-hint>
    </mat-form-field>
    <mat-form-field appearance="outline" class="col">
      <mat-label i18n="@@common.type">Type</mat-label>
      <mat-select formControlName="type" required>
        <mat-option *ngFor="let t of types" [value]="t.value">{{ t.label }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@common.name">Nom</mat-label>
    <input matInput formControlName="name" maxlength="250" required>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@fmea.create.scope">Périmètre</mat-label>
    <textarea matInput formControlName="scope" rows="3" maxlength="1000"
              i18n-placeholder="@@fmea.create.scope-placeholder"
              placeholder="Décrivez le périmètre de l'analyse"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@fmea.create.rpn-threshold">Seuil RPN critique</mat-label>
    <input matInput formControlName="criticalRpnThreshold" type="number" min="1" max="1000" required>
    <mat-hint i18n="@@fmea.create.rpn-threshold-hint">RPN = Sévérité × Occurrence × Détection. Items ≥ seuil = CRITIQUES.</mat-hint>
  </mat-form-field>

</qos-form-dialog>
