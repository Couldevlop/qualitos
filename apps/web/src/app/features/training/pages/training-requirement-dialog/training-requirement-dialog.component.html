<h2 mat-dialog-title>Ajouter une exigence de compétence</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="req-form">
  <mat-dialog-content>
    <p class="hint">Échelle Dreyfus 0-4 : NONE / AWARE / PRACTITIONER / COMPETENT / EXPERT.
       Le gap = (cible - acquis) sera utilisé par l'analyse de gap par utilisateur.</p>

    <div *ngIf="loadError" class="banner banner-error" role="alert">{{ loadError }}</div>
    <div *ngIf="loading"   class="banner banner-info">Chargement…</div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Compétence</mat-label>
      <mat-select formControlName="skillId" required>
        <mat-option *ngFor="let s of (skills$ | async)" [value]="s.id">
          {{ s.code }} — {{ s.name }}
        </mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Niveau cible</mat-label>
      <mat-select formControlName="targetLevel" required>
        <mat-option *ngFor="let n of levels" [value]="n">{{ n }} — {{ levelLabels[n] }}</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Rattacher
    </button>
  </mat-dialog-actions>
</form>
