<qos-form-dialog
  title="Ajouter une exigence de compétence"
  subtitle="Échelle Dreyfus 0-4 : NONE / AWARE / PRACTITIONER / COMPETENT / EXPERT. Le gap = (cible - acquis) sera utilisé par l'analyse de gap par utilisateur."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Rattacher"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <div *ngIf="loadError" class="banner banner-error" role="alert">{{ loadError }}</div>
  <div *ngIf="loading"   class="banner banner-info">Chargement…</div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Compétence</mat-label>
    <mat-select formControlName="skillId" required>
      <mat-option *ngFor="let s of (skills$ | async)" [value]="s.id">
        {{ s.code }} — {{ s.name }}
      </mat-option>
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Niveau cible</mat-label>
    <mat-select formControlName="targetLevel" required>
      <mat-option *ngFor="let n of levels" [value]="n">{{ n }} — {{ levelLabels[n] }}</mat-option>
    </mat-select>
  </mat-form-field>

</qos-form-dialog>
