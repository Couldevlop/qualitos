<qos-form-dialog
  [title]="isEdit ? 'Modifier le parcours' : 'Nouveau parcours'"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  [submitLabel]="isEdit ? 'Enregistrer' : 'Créer'"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <div class="row">
    <mat-form-field appearance="outline" class="col col-code">
      <mat-label>Code</mat-label>
      <input matInput formControlName="code" maxlength="100" required
             placeholder="Ex. : yellow-belt-quality">
      <mat-hint>minuscules, chiffres, tiret, underscore</mat-hint>
    </mat-form-field>
    <mat-form-field appearance="outline" class="col">
      <mat-label>Rôle cible</mat-label>
      <input matInput formControlName="targetRole" maxlength="100"
             placeholder="Ex. : Auditeur interne">
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Nom</mat-label>
    <input matInput formControlName="name" maxlength="200" required>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Description</mat-label>
    <textarea matInput formControlName="description" rows="3" maxlength="2000"></textarea>
  </mat-form-field>

  <div class="row">
    <mat-form-field appearance="outline" class="col">
      <mat-label>Durée (heures)</mat-label>
      <input matInput formControlName="durationHours" type="number" min="1" max="10000" required>
    </mat-form-field>
    <mat-form-field appearance="outline" class="col">
      <mat-label>Score de passage</mat-label>
      <input matInput formControlName="passingScore" type="number" min="0" max="100">
    </mat-form-field>
    <mat-form-field appearance="outline" class="col">
      <mat-label>Validité (mois)</mat-label>
      <input matInput formControlName="validityMonths" type="number" min="1" max="120">
    </mat-form-field>
  </div>

</qos-form-dialog>
