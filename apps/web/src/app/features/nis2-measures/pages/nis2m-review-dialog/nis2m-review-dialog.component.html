<h2 mat-dialog-title>{{ title }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="rev-form">
  <mat-dialog-content>
    <p class="hint">{{ hint }}</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Date de la revue</mat-label>
      <input matInput formControlName="reviewedAt" type="datetime-local" required>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">{{ data.mode === 'VERIFY' ? 'verified' : 'fact_check' }}</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Confirmer
    </button>
  </mat-dialog-actions>
</form>
