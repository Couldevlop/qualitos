<h2 mat-dialog-title>{{ title }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="rsn-form">
  <mat-dialog-content>
    <p class="warn">
      <strong *ngIf="data.mode === 'SUSPEND'">Suspension temporaire.</strong>
      <strong *ngIf="data.mode === 'TERMINATE'">Action terminale.</strong>
      Le motif est obligatoire pour la traçabilité.
    </p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Motif</mat-label>
      <textarea matInput formControlName="reason" rows="4" maxlength="2000" required></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="warn" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">{{ data.mode === 'SUSPEND' ? 'pause_circle' : 'cancel' }}</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Confirmer
    </button>
  </mat-dialog-actions>
</form>
