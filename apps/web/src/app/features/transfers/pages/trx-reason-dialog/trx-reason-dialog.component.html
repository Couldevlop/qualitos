<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Confirmer"
  [submitIcon]="data.mode === 'SUSPEND' ? 'pause_circle' : 'cancel'"
  submitColor="warn"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="warn">
    <strong *ngIf="data.mode === 'SUSPEND'">Suspension temporaire.</strong>
    <strong *ngIf="data.mode === 'TERMINATE'">Action terminale.</strong>
    Le motif est obligatoire pour la traçabilité.
  </p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Motif</mat-label>
    <textarea matInput formControlName="reason" rows="4" maxlength="2000" required></textarea>
  </mat-form-field>

</qos-form-dialog>
