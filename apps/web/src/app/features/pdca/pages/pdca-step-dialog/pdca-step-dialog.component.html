<qos-form-dialog
  title="Ajouter une étape"
  subtitle="Décris l'action concrète et choisis sa phase dans le cycle PDCA."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Ajouter"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Titre de l'étape</mat-label>
    <input matInput formControlName="title" maxlength="255" required
           placeholder="Ex. : Analyse Pareto des défauts soudure">
    <mat-error *ngIf="form.controls.title.hasError('required')">Le titre est requis.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Description (optionnel)</mat-label>
    <textarea matInput formControlName="description" rows="3"
              placeholder="Méthode, livrable attendu, parties prenantes…"></textarea>
  </mat-form-field>

  <div class="row">
    <mat-form-field appearance="outline" class="col">
      <mat-label>Phase</mat-label>
      <mat-select formControlName="phase">
        <mat-option *ngFor="let p of phases" [value]="p">{{ p }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="col">
      <mat-label>Échéance (optionnel)</mat-label>
      <input matInput formControlName="dueDate" type="date">
    </mat-form-field>
  </div>

</qos-form-dialog>
