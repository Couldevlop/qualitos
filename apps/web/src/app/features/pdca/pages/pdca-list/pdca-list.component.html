<div class="qos-page">

  <header class="page-header">
    <div>
      <h1>Cycles PDCA</h1>
      <p>Roue de Deming : Plan → Do → Check → Act.</p>
    </div>
    <button mat-flat-button color="primary" type="button" (click)="openCreate()">
      <mat-icon>add</mat-icon>
      Nouveau cycle
    </button>
  </header>

  <mat-card class="filter-card">
    <mat-form-field appearance="outline" class="status-filter">
      <mat-label>Filtrer par statut</mat-label>
      <mat-select [formControl]="statusFilter">
        <mat-option [value]="''">Tous</mat-option>
        <mat-option *ngFor="let s of statuses" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-card>

  <div class="state-row" *ngIf="loading$ | async">
    <mat-progress-spinner mode="indeterminate" diameter="36"></mat-progress-spinner>
    <span>Chargement…</span>
  </div>

  <div class="state-row error" *ngIf="error$ | async as err">
    <mat-icon>error_outline</mat-icon>
    <span>{{ err }}</span>
  </div>

  <mat-card class="table-card" *ngIf="(loading$ | async) === false && (error$ | async) === null">
    <table mat-table [dataSource]="(cycles$ | async) ?? []" class="cycles-table">

      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef>Titre</th>
        <td mat-cell *matCellDef="let c">
          <div class="cell-title">
            <strong>{{ c.title }}</strong>
            <small>{{ c.description }}</small>
          </div>
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Statut</th>
        <td mat-cell *matCellDef="let c">
          <span [class]="statusBadgeClass(c.status)">{{ c.status }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="steps">
        <th mat-header-cell *matHeaderCellDef>Étapes</th>
        <td mat-cell *matCellDef="let c">{{ c.steps?.length || 0 }}</td>
      </ng-container>

      <ng-container matColumnDef="updatedAt">
        <th mat-header-cell *matHeaderCellDef>Dernière MAJ</th>
        <td mat-cell *matCellDef="let c">{{ c.updatedAt | date:'short' }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          class="clickable-row"
          (click)="openCycle(row)"
          (keydown.enter)="openCycle(row)"
          tabindex="0"
          role="button"
          [attr.aria-label]="'Ouvrir ' + row.title"></tr>
    </table>

    <p class="empty" *ngIf="(cycles$ | async)?.length === 0">
      Aucun cycle pour ce filtre.
    </p>

    <mat-paginator [length]="totalElements"
                   [pageSize]="pageSize"
                   [pageIndex]="pageIndex"
                   [pageSizeOptions]="pageSizeOptions"
                   (page)="onPage($event)"
                   showFirstLastButtons
                   aria-label="Pagination des cycles">
    </mat-paginator>
  </mat-card>

</div>
