<h2 mat-dialog-title>Nouveau cycle PDCA</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="create-form">
  <mat-dialog-content>
    <p class="hint">Décris brièvement le problème ou l'objectif. Les étapes Plan / Do / Check / Act
       pourront être ajoutées ensuite.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Titre du cycle</mat-label>
      <input matInput formControlName="title" maxlength="255" required
             placeholder="Ex. : Réduction des défauts de soudure — ligne 3">
      <mat-error *ngIf="form.controls.title.hasError('required')">Le titre est requis.</mat-error>
      <mat-error *ngIf="form.controls.title.hasError('maxlength')">255 caractères maximum.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description (optionnel)</mat-label>
      <textarea matInput formControlName="description" rows="4"
                placeholder="Pilote, périmètre, objectif chiffré, échéance…"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit"
            [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Créer
    </button>
  </mat-dialog-actions>
</form>
