<qos-form-dialog
  title="Modifier l'audit"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Zone</mat-label>
    <input matInput formControlName="zone" maxlength="200" required>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Description</mat-label>
    <textarea matInput formControlName="description" rows="3"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Date prévue</mat-label>
    <input matInput formControlName="scheduledAt" type="datetime-local">
  </mat-form-field>

</qos-form-dialog>
