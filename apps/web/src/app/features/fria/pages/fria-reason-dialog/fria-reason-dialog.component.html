<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Confirmer"
  [submitIcon]="data.mode === 'RETURN' ? 'undo' : 'archive'"
  [submitColor]="data.mode === 'ARCHIVE' ? 'warn' : 'primary'"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="hint" [class.warn]="data.mode === 'ARCHIVE'">{{ hint }}</p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>{{ data.mode === 'RETURN' ? 'Motif du retour' : 'Motif de l\'archivage' }}</mat-label>
    <textarea matInput formControlName="reason" rows="5"
              [attr.maxlength]="data.mode === 'RETURN' ? 4000 : 2000" required></textarea>
  </mat-form-field>

</qos-form-dialog>
