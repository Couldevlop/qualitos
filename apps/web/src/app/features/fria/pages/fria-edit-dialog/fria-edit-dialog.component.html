<qos-form-dialog
  title="Éditer la FRIA"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitIcon="save"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="hint">Édition possible uniquement en statut DRAFT. La référence et
     le système IA ne sont pas modifiables.</p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Description du processus déployé</mat-label>
    <textarea matInput formControlName="processDescription" rows="4" maxlength="4000" required></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Durée prévue du déploiement</mat-label>
    <textarea matInput formControlName="deploymentDurationDescription" rows="2" maxlength="4000"></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Catégories de personnes affectées</mat-label>
    <textarea matInput formControlName="affectedPersonsCategories" rows="3" maxlength="4000" required></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Risques spécifiques</mat-label>
    <textarea matInput formControlName="specificRisks" rows="4" maxlength="4000" required></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Mesures d'atténuation</mat-label>
    <textarea matInput formControlName="mitigationMeasures" rows="3" maxlength="4000"></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Mesures de supervision humaine</mat-label>
    <textarea matInput formControlName="humanOversightMeasures" rows="3" maxlength="4000"></textarea>
  </mat-form-field>
  <mat-form-field appearance="outline" class="full">
    <mat-label>Mécanisme de réclamation</mat-label>
    <textarea matInput formControlName="complaintMechanismDescription" rows="3" maxlength="4000"></textarea>
  </mat-form-field>

</qos-form-dialog>
