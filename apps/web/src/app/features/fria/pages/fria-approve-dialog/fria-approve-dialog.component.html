<h2 mat-dialog-title>Approuver la FRIA</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="apr-form">
  <mat-dialog-content>
    <p class="hint">Vous approuvez la FRIA en tant que responsable conformité. Une fois
       approuvée, la FRIA peut être archivée mais plus modifiée.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Notes d'approbation (optionnel)</mat-label>
      <textarea matInput formControlName="approvalNotes" rows="5" maxlength="4000"
                placeholder="Conditions, recommandations, points d'attention…"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">verified</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Approuver
    </button>
  </mat-dialog-actions>
</form>
