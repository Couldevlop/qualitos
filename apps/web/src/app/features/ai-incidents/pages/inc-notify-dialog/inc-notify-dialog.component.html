<qos-form-dialog
  title="Notifier le régulateur (Art. 73)"
  subtitle="Renseignez la référence de la notification au régulateur (CNIL/EU AI Office) et l'analyse de cause racine. Les actions correctives peuvent être complétées par la suite."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Notifier"
  submitIcon="send"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Référence notification (CNIL ou équivalent)</mat-label>
    <input matInput formControlName="regulatorReference" maxlength="250" required
           placeholder="CNIL-IA-2026-INC-007">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Analyse de cause racine</mat-label>
    <textarea matInput formControlName="rootCauseAnalysis" rows="5" maxlength="4000" required></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Actions correctives (optionnel)</mat-label>
    <textarea matInput formControlName="correctiveActions" rows="3" maxlength="4000"></textarea>
  </mat-form-field>

</qos-form-dialog>
