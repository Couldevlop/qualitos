<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Confirmer"
  i18n-submitLabel="@@common.confirm"
  [submitIcon]="data.mode === 'CLOSE' ? 'check_circle' : 'block'"
  [submitColor]="data.mode === 'DISMISS' ? 'warn' : 'primary'"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p [class.warn]="data.mode === 'DISMISS'" class="head-note">
    <ng-container *ngIf="data.mode === 'CLOSE'">
      <span i18n="@@ai-incidents.close.hint-close">Décrire les actions correctives définitives. La clôture est terminale.</span>
    </ng-container>
    <ng-container *ngIf="data.mode === 'DISMISS'">
      <strong i18n="@@ai-incidents.close.terminal-action">Action terminale.</strong>
      <span i18n="@@ai-incidents.close.hint-dismiss">Motiver le rejet (faux positif, hors champ AI Act, doublon, etc.).</span>
    </ng-container>
  </p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>{{ data.mode === 'CLOSE' ? 'Actions correctives définitives' : 'Motif du rejet' }}</mat-label>
    <textarea matInput formControlName="text" rows="5"
              [attr.maxlength]="data.mode === 'CLOSE' ? 4000 : 2000" required></textarea>
  </mat-form-field>

</qos-form-dialog>
