<section class="qos-activity" i18n-aria-label="@@activity-feed.widget.aria" aria-label="Activité récente">
  <header class="qos-activity__head">
    <span class="material-symbols-outlined" aria-hidden="true">history</span>
    <h3 i18n="@@activity-feed.widget.title">Activité récente</h3>
  </header>

  <div class="qos-activity__state" *ngIf="loading">
    <mat-progress-spinner mode="indeterminate" diameter="22"></mat-progress-spinner>
    <span i18n="@@common.loading">Chargement…</span>
  </div>

  <div class="qos-activity__state qos-activity__state--error" *ngIf="errored && !loading">
    <span class="material-symbols-outlined" aria-hidden="true">error_outline</span>
    <span i18n="@@activity-feed.widget.error">Flux indisponible pour le moment.</span>
  </div>

  <p class="qos-activity__empty" *ngIf="!loading && !errored && entries.length === 0" i18n="@@activity-feed.widget.empty">
    Aucune activité récente.
  </p>

  <ul class="qos-activity__list" *ngIf="!loading && !errored && entries.length > 0">
    <li class="qos-activity__item" *ngFor="let e of entries; trackBy: trackById">
      <span class="qos-activity__icon material-symbols-outlined" aria-hidden="true">{{ iconFor(e) }}</span>
      <span class="qos-activity__text">
        <span class="qos-activity__label">{{ labelFor(e) }}</span>
        <span class="qos-activity__meta">{{ e.action }} · {{ timeAgo(e.occurredAt) }}</span>
      </span>
    </li>
  </ul>
</section>
