<h2 mat-dialog-title>Approuver le QMS</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="app-form">
  <mat-dialog-content>
    <p class="hint">L'approbation enregistre l'identité du soumissionnaire et de
       l'approbateur (séparation des rôles requise par AI Act Art. 17). Vous serez
       enregistré comme approbateur via votre session courante.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>UUID du soumissionnaire (doit ≠ vous)</mat-label>
      <input matInput formControlName="submittedByUserId" required
             placeholder="00000000-0000-0000-0000-000000000000">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Notes d'approbation</mat-label>
      <textarea matInput formControlName="approvalNotes" rows="4" maxlength="4000"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">verified</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Approuver
    </button>
  </mat-dialog-actions>
</form>
