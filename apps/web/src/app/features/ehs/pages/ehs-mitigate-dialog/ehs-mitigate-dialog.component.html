<h2 mat-dialog-title>Mitiger l'incident</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="mit-form">
  <mat-dialog-content>
    <p class="hint">Renseignez la cause racine et les actions correctives engagées.
       Le statut passera à MITIGATED et l'incident pourra être clôturé ensuite.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Cause racine</mat-label>
      <textarea matInput formControlName="rootCause" rows="4" maxlength="2000" required></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Actions correctives</mat-label>
      <textarea matInput formControlName="correctiveActions" rows="4" maxlength="2000" required></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Mitiger
    </button>
  </mat-dialog-actions>
</form>
