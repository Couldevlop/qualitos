<h2 mat-dialog-title>Déclarer un incident EHS</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="ehs-form">
  <mat-dialog-content>
    <div class="row">
      <mat-form-field appearance="outline" class="col col-code">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" maxlength="100" required
               placeholder="Ex. : EHS-2026-014">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Type</mat-label>
        <mat-select formControlName="type" required>
          <mat-option *ngFor="let t of types" [value]="t.value">{{ t.label }}</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col col-small">
        <mat-label>Sévérité</mat-label>
        <mat-select formControlName="severity" required>
          <mat-option *ngFor="let s of severities" [value]="s">{{ s }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Titre</mat-label>
      <input matInput formControlName="title" maxlength="250" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="4" maxlength="4000"
                placeholder="Faits, contexte, personnes impactées, suite immédiate"></textarea>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Date et heure de l'événement</mat-label>
        <input matInput formControlName="occurredAt" type="datetime-local">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Lieu</mat-label>
        <input matInput formControlName="location" maxlength="500"
               placeholder="Atelier B, zone 3…">
      </mat-form-field>
    </div>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Déclarer
    </button>
  </mat-dialog-actions>
</form>
