<qos-form-dialog
  title="Nouveau cas CAPA"
  subtitle="Crée un cas correctif ou préventif. Les actions seront ajoutées ensuite et l'efficacité vérifiée à la clôture."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Créer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Titre</mat-label>
    <input matInput formControlName="title" maxlength="255" required
           placeholder="Ex. : Recalibration robot soudure cobot-3">
    <mat-error *ngIf="form.controls.title.hasError('required')">Le titre est requis.</mat-error>
    <mat-error *ngIf="form.controls.title.hasError('maxlength')">255 caractères maximum.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Description (optionnel)</mat-label>
    <textarea matInput formControlName="description" rows="3"
              placeholder="Contexte, impact, observations…"></textarea>
  </mat-form-field>

  <div class="row">
    <mat-form-field appearance="outline" class="col">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option *ngFor="let t of types" [value]="t">{{ t }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="col">
      <mat-label>Criticité</mat-label>
      <mat-select formControlName="criticity">
        <mat-option *ngFor="let c of criticities" [value]="c">{{ c }}</mat-option>
      </mat-select>
    </mat-form-field>
  </div>

  <div class="row">
    <mat-form-field appearance="outline" class="col">
      <mat-label>Source</mat-label>
      <mat-select formControlName="sourceType">
        <mat-option *ngFor="let s of sourceTypes" [value]="s.value">{{ s.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="col">
      <mat-label>Référence source (optionnel)</mat-label>
      <input matInput formControlName="sourceRef" maxlength="255"
             placeholder="Ex. : NC-2026-018">
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Échéance (optionnel)</mat-label>
    <input matInput formControlName="dueDate" type="date">
  </mat-form-field>

</qos-form-dialog>
