<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Confirmer"
  i18n-submitLabel="@@ai-pmm.reason.confirm"
  [submitIcon]="data.mode === 'SUSPEND' ? 'pause' : 'archive'"
  [submitColor]="data.mode === 'CLOSE' ? 'warn' : 'primary'"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="hint" [class.warn]="data.mode === 'CLOSE'" [innerHTML]="hint"></p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>{{ reasonLabel }}</mat-label>
    <textarea matInput formControlName="reason" rows="5" maxlength="2000" required></textarea>
  </mat-form-field>

</qos-form-dialog>
