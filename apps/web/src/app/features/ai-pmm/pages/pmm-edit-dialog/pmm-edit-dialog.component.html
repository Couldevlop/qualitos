<h2 mat-dialog-title>Éditer le plan PMM</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="edt-form">
  <mat-dialog-content>
    <p class="hint">La référence et le système IA ne sont pas modifiables. Changer la
       fréquence recalcule la prochaine échéance de revue.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nom du plan</mat-label>
      <input matInput formControlName="name" maxlength="250" required>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3" maxlength="4000"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Métriques surveillées</mat-label>
      <textarea matInput formControlName="metricsMonitored" rows="3" maxlength="4000"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Méthode de collecte</mat-label>
      <textarea matInput formControlName="collectionMethod" rows="3" maxlength="4000"></textarea>
    </mat-form-field>
    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Fréquence de revue</mat-label>
        <mat-select formControlName="reviewFrequency" required>
          <mat-option *ngFor="let f of frequencies" [value]="f">{{ freqLabel[f] }}</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Lien QMS</mat-label>
        <input matInput formControlName="qmsLinkReference" maxlength="250">
      </mat-form-field>
    </div>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Partie responsable</mat-label>
      <textarea matInput formControlName="responsiblePartyDescription" rows="2" maxlength="4000"></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Critères de déclenchement</mat-label>
      <textarea matInput formControlName="triggerCriteria" rows="3" maxlength="4000"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">save</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
