<h2 mat-dialog-title>Nouvelle mesure</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="measure-form">
  <mat-dialog-content>
    <p class="hint">Mesure d'un point caractéristique du procédé (Y critique). Sera utilisée
       pour le calcul des indices de capabilité Cp/Cpk.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Valeur</mat-label>
      <input matInput formControlName="value" type="number" step="any" required>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Sous-groupe</mat-label>
        <input matInput formControlName="subgroupId" maxlength="100"
               placeholder="Ex. : équipe-A, machine-3">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Date / heure</mat-label>
        <input matInput formControlName="recordedAt" type="datetime-local">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Référence source</mat-label>
      <input matInput formControlName="sourceRef" maxlength="255"
             placeholder="Ex. : OF-2026-1145, lot-3214">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Note</mat-label>
      <textarea matInput formControlName="note" rows="2"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
