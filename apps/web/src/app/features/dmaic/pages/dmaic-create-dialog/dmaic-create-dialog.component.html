<h2 mat-dialog-title>Nouveau projet DMAIC</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="dmaic-form">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Titre</mat-label>
      <input matInput formControlName="title" maxlength="255" required
             placeholder="Ex. : Réduire le taux de rebut ligne A">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Énoncé du problème</mat-label>
      <textarea matInput formControlName="problemStatement" rows="3"
                placeholder="Contexte, données chiffrées du problème"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Énoncé de l'objectif</mat-label>
      <textarea matInput formControlName="goalStatement" rows="2"
                placeholder="Objectif SMART + impact business attendu"></textarea>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Champion (ID)</mat-label>
        <input matInput formControlName="championId" placeholder="UUID utilisateur">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Date cible</mat-label>
        <input matInput formControlName="targetCompletionDate" type="date">
      </mat-form-field>
    </div>

    <h3 class="section">Spécifications procédé (optionnel — requis pour Cp/Cpk)</h3>
    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>LSL</mat-label>
        <input matInput formControlName="specLowerLimit" type="number" step="any">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Cible</mat-label>
        <input matInput formControlName="specTarget" type="number" step="any">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>USL</mat-label>
        <input matInput formControlName="specUpperLimit" type="number" step="any">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col col-small">
        <mat-label>Unité</mat-label>
        <input matInput formControlName="specUnit" maxlength="50" placeholder="mm, s, °C…">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Économies estimées (€)</mat-label>
      <input matInput formControlName="estimatedSavingsEur" type="number" min="0" step="any">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Créer
    </button>
  </mat-dialog-actions>
</form>
