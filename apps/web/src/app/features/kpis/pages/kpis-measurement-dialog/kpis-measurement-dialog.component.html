<h2 mat-dialog-title>Nouvelle mesure</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="mes-form">
  <mat-dialog-content>
    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Début de période</mat-label>
        <input matInput formControlName="periodStart" type="datetime-local" required>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Fin de période</mat-label>
        <input matInput formControlName="periodEnd" type="datetime-local" required>
      </mat-form-field>
    </div>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Valeur</mat-label>
        <input matInput formControlName="value" type="number" step="any" required>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col col-small">
        <mat-label>Unité</mat-label>
        <input matInput formControlName="unit" maxlength="32">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Source</mat-label>
        <mat-select formControlName="source">
          <mat-option *ngFor="let s of sources" [value]="s">{{ s }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="2" maxlength="1000"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
