<h2 mat-dialog-title>{{ isEdit ? 'Modifier le KPI' : 'Nouveau KPI' }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="kpi-form">
  <mat-dialog-content>
    <div class="row">
      <mat-form-field appearance="outline" class="col col-code">
        <mat-label>Code</mat-label>
        <input matInput formControlName="code" maxlength="100" required
               placeholder="capa-closure-time">
        <mat-hint>minuscules, chiffres, tiret, underscore</mat-hint>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Catégorie</mat-label>
        <input matInput formControlName="category" maxlength="64"
               placeholder="CAPA, Qualité, DMAIC…">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col col-small">
        <mat-label>Unité</mat-label>
        <input matInput formControlName="unit" maxlength="32"
               placeholder="%, jours, DPMO…">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nom</mat-label>
      <input matInput formControlName="name" maxlength="250" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Définition / formule</mat-label>
      <textarea matInput formControlName="description" rows="3" maxlength="2000"
                placeholder="Définition explicite — formule, source, propriétaire (§6.1)"></textarea>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Sens d'optimisation</mat-label>
        <mat-select formControlName="direction" required>
          <mat-option *ngFor="let d of directions" [value]="d.value">{{ d.label }}</mat-option>
        </mat-select>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col col-small">
        <mat-label>Fréquence</mat-label>
        <mat-select formControlName="frequency">
          <mat-option *ngFor="let f of frequencies" [value]="f">{{ f }}</mat-option>
        </mat-select>
      </mat-form-field>
    </div>

    <h3 class="section">Seuils</h3>
    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Cible</mat-label>
        <input matInput formControlName="targetValue" type="number" step="any">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Warning</mat-label>
        <input matInput formControlName="thresholdWarning" type="number" step="any">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Critical</mat-label>
        <input matInput formControlName="thresholdCritical" type="number" step="any">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Secteurs applicables (CSV)</mat-label>
      <input matInput formControlName="applicableIndustriesCsv" maxlength="1000"
             placeholder="all, Manufacturing, Pharma, Banque…">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      {{ isEdit ? 'Enregistrer' : 'Créer' }}
    </button>
  </mat-dialog-actions>
</form>
