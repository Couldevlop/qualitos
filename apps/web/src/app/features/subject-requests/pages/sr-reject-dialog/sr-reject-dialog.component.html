<qos-form-dialog
  title="Rejeter la demande"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Confirmer le rejet"
  submitIcon="block"
  submitColor="warn"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="warn">
    <strong>Action terminale.</strong>
    Un rejet doit être motivé conformément à l'Art. 12§4 RGPD :
    la personne doit être informée du motif et de la possibilité
    d'introduire une réclamation (CNIL/EDPB).
  </p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Motif du rejet</mat-label>
    <textarea matInput formControlName="reason" rows="6" maxlength="2000" required
              placeholder="Demande manifestement infondée / excessive (Art. 12§5), identité non vérifiée, exception légale, etc."></textarea>
  </mat-form-field>

</qos-form-dialog>
