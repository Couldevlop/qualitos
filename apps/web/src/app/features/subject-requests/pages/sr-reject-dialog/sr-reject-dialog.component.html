<h2 mat-dialog-title>Rejeter la demande</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="rj-form">
  <mat-dialog-content>
    <p class="warn">
      <strong>Action terminale.</strong>
      Un rejet doit être motivé conformément à l'Art. 12§4 RGPD :
      la personne doit être informée du motif et de la possibilité
      d'introduire une réclamation (CNIL/EDPB).
    </p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Motif du rejet</mat-label>
      <textarea matInput formControlName="reason" rows="6" maxlength="2000" required
                placeholder="Demande manifestement infondée / excessive (Art. 12§5), identité non vérifiée, exception légale, etc."></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="warn" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">block</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Confirmer le rejet
    </button>
  </mat-dialog-actions>
</form>
