<h2 mat-dialog-title>Clôturer la demande</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="cmp-form">
  <mat-dialog-content>
    <p class="hint">Notez le détail de la réponse fournie (Art. 12§3 — accuser la
       suite donnée). Joignez optionnellement une URL de preuve archivée
       (PDF signé, ticket interne…).</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Notes de résolution</mat-label>
      <textarea matInput formControlName="resolutionNotes" rows="6" maxlength="4000" required
                placeholder="Données fournies, format, canal de transmission, périmètre…"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>URL de preuve (https://… — optionnelle)</mat-label>
      <input matInput formControlName="evidenceUrl" maxlength="1024"
             placeholder="https://www.qualitos.io/audit/sr-xxx.pdf">
      <mat-error *ngIf="form.controls.evidenceUrl.hasError('pattern')">
        Seules les URLs https:// sont acceptées.
      </mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check_circle</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Clôturer
    </button>
  </mat-dialog-actions>
</form>
