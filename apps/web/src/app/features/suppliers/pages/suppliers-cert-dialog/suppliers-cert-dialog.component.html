<qos-form-dialog
  title="Nouveau certificat"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Ajouter"
  submitIcon="add"
  (submitted)="submit()"
  (cancelled)="cancel()">

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Code norme</mat-label>
        <input matInput formControlName="standardCode" maxlength="64" required
               placeholder="Ex. : iso-9001, iatf-16949, as9100">
        <mat-hint>minuscules, chiffres, tiret, underscore</mat-hint>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Référence</mat-label>
        <input matInput formControlName="reference" maxlength="200">
      </mat-form-field>
    </div>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Date d'émission</mat-label>
        <input matInput formControlName="issuedOn" type="date" required>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col">
        <mat-label>Date d'expiration</mat-label>
        <input matInput formControlName="expiresOn" type="date" required>
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>URL document</mat-label>
      <input matInput formControlName="documentUrl" maxlength="1024"
             placeholder="https://… (PDF signé)">
    </mat-form-field>

</qos-form-dialog>
