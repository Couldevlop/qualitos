<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  [submitColor]="danger ? 'warn' : 'primary'"
  submitLabel="Confirmer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p [class.warn]="danger">{{ description }}</p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Motif {{ data.reasonRequired ? '(obligatoire)' : '(optionnel)' }}</mat-label>
    <textarea matInput formControlName="reason" rows="3" maxlength="1000"
              placeholder="Justification du changement de statut, références"></textarea>
  </mat-form-field>

</qos-form-dialog>
