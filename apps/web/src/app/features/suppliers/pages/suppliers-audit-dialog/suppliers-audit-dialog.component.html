<h2 mat-dialog-title>Nouvel audit fournisseur</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="audit-form">
  <mat-dialog-content>
    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Date de l'audit</mat-label>
        <input matInput formControlName="auditedOn" type="date" required>
      </mat-form-field>
      <mat-form-field appearance="outline" class="col col-small">
        <mat-label>Score (0-100)</mat-label>
        <input matInput formControlName="score" type="number" min="0" max="100" required>
      </mat-form-field>
    </div>

    <h3 class="section">Constats</h3>
    <div class="row">
      <mat-form-field appearance="outline" class="col-small">
        <mat-label>Critiques</mat-label>
        <input matInput formControlName="criticalFindingsCount" type="number" min="0">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col-small">
        <mat-label>Majeurs</mat-label>
        <input matInput formControlName="majorFindingsCount" type="number" min="0">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col-small">
        <mat-label>Mineurs</mat-label>
        <input matInput formControlName="minorFindingsCount" type="number" min="0">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Synthèse des constats</mat-label>
      <textarea matInput formControlName="findingsSummary" rows="4" maxlength="2000"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
