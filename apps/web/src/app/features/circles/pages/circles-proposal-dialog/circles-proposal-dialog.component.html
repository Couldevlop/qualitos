<h2 mat-dialog-title>Nouvelle proposition</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="proposal-form">
  <mat-dialog-content>
    <p class="hint">Idée d'amélioration soumise au cercle. Elle sera évaluée puis
       implémentée et mesurée si approuvée (workflow PROPOSED → APPROVED → MEASURED).</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Titre</mat-label>
      <input matInput formControlName="title" maxlength="255" required
             placeholder="Ex. : Ajouter un Poka-Yoke positionnement pièce">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="4"
                placeholder="Contexte, objectif, bénéfice attendu, charge estimée…"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Proposer
    </button>
  </mat-dialog-actions>
</form>
