<qos-form-dialog
  title="Planifier une réunion"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Planifier"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Titre</mat-label>
    <input matInput formControlName="title" maxlength="255" required
           placeholder="Ex. : Revue mensuelle production">
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Ordre du jour</mat-label>
    <textarea matInput formControlName="agenda" rows="3"
              placeholder="Points à aborder, propositions à valider…"></textarea>
  </mat-form-field>

  <div class="row">
    <mat-form-field appearance="outline" class="col">
      <mat-label>Date et heure</mat-label>
      <input matInput formControlName="scheduledAt" type="datetime-local" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="col-small">
      <mat-label>Durée (min)</mat-label>
      <input matInput formControlName="durationMinutes" type="number" min="1">
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Lieu</mat-label>
    <input matInput formControlName="location" maxlength="500"
           placeholder="Salle, ou lien visio">
  </mat-form-field>

</qos-form-dialog>
