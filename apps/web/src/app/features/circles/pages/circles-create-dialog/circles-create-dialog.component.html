<h2 mat-dialog-title>Nouveau cercle de qualité</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="create-form">
  <mat-dialog-content>
    <p class="hint">Crée le groupe (5-10 personnes recommandé). Les membres, réunions
       et propositions seront ajoutés ensuite.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nom du cercle</mat-label>
      <input matInput formControlName="name" maxlength="255" required
             placeholder="Ex. : Cercle production ligne 3">
      <mat-error *ngIf="form.controls.name.hasError('required')">Le nom est requis.</mat-error>
      <mat-error *ngIf="form.controls.name.hasError('maxlength')">255 caractères maximum.</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Thème (optionnel)</mat-label>
      <input matInput formControlName="topic" maxlength="255"
             placeholder="Ex. : production-soudure, fournisseurs, sécurité">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description (optionnel)</mat-label>
      <textarea matInput formControlName="description" rows="3"
                placeholder="Mission du cercle, périmètre, fréquence visée…"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit"
            [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Créer
    </button>
  </mat-dialog-actions>
</form>
