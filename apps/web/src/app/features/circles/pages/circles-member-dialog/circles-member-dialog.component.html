<qos-form-dialog
  i18n-title="@@circles.member.title"
  title="Ajouter un membre"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  i18n-submitLabel="@@common.add"
  submitLabel="Ajouter"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="hint" i18n="@@circles.member.hint">Renseigne l'identifiant utilisateur (UUID) et le rôle. La liste
     de sélection sera branchée sur l'annuaire Keycloak dans une prochaine itération.</p>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@circles.member.user-id">User ID (UUID)</mat-label>
    <input matInput formControlName="userId" required
           placeholder="00000000-0000-0000-0000-000000000000">
    <mat-error *ngIf="form.controls.userId.hasError('required')" i18n="@@circles.member.uuid-required">UUID requis.</mat-error>
    <mat-error *ngIf="form.controls.userId.hasError('pattern')" i18n="@@circles.member.uuid-invalid">Format UUID invalide.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@circles.detail.role">Rôle</mat-label>
    <mat-select formControlName="role">
      <mat-option *ngFor="let r of roles" [value]="r.value">{{ r.label }}</mat-option>
    </mat-select>
  </mat-form-field>

</qos-form-dialog>
