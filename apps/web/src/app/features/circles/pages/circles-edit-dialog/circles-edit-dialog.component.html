<h2 mat-dialog-title>Modifier le cercle</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="edit-form">
  <mat-dialog-content>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nom</mat-label>
      <input matInput formControlName="name" maxlength="255" required>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Thème</mat-label>
      <input matInput formControlName="topic" maxlength="255">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
