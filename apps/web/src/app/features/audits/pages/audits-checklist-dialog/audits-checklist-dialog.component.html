<h2 mat-dialog-title>Ajouter une question</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="checklist-form">
  <mat-dialog-content>
    <p class="hint">Une question vérifiable sur le terrain, idéalement reliée à une
       clause de la norme auditée.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Question</mat-label>
      <textarea matInput formControlName="question" rows="2" required
                placeholder="Ex. : Les enregistrements de calibration sont-ils traçables ?"></textarea>
      <mat-error *ngIf="form.controls.question.hasError('required')">Requis.</mat-error>
    </mat-form-field>

    <div class="row">
      <mat-form-field appearance="outline" class="col">
        <mat-label>Clause (optionnel)</mat-label>
        <input matInput formControlName="clauseRef" maxlength="100"
               placeholder="Ex. : 7.1.5.1">
      </mat-form-field>

      <mat-form-field appearance="outline" class="col-small">
        <mat-label>Poids</mat-label>
        <input matInput formControlName="weight" type="number" min="1">
      </mat-form-field>
    </div>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Preuve attendue (optionnel)</mat-label>
      <textarea matInput formControlName="expectedEvidence" rows="2"
                placeholder="Ex. : Certificat d'étalonnage signé sous 12 mois"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit"
            [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Ajouter
    </button>
  </mat-dialog-actions>
</form>
