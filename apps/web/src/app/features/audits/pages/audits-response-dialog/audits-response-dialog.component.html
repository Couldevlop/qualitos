<qos-form-dialog
  i18n-title="@@audits.response.title"
  title="Réponse à la question"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  i18n-submitLabel="@@common.save"
  submitLabel="Enregistrer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="question-block">
    <span class="clause" *ngIf="data.clauseRef">{{ data.clauseRef }}</span>
    <strong>{{ data.question }}</strong>
  </p>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@audits.response.observation">Réponse / Observation (optionnel)</mat-label>
    <textarea matInput formControlName="response" rows="3"
              i18n-placeholder="@@audits.response.observation-placeholder"
              placeholder="Ce que tu as observé sur le terrain, références aux preuves rassemblées…"></textarea>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@audits.response.conformity">Conformité</mat-label>
    <mat-select formControlName="conformant" required>
      <mat-option [value]="true" i18n="@@audits.response.conformant">Conforme</mat-option>
      <mat-option [value]="false" i18n="@@audits.response.non-conformant">Non conforme</mat-option>
    </mat-select>
    <mat-error *ngIf="form.controls.conformant.hasError('required')" i18n="@@audits.response.choose">Choisis Conforme ou NC.</mat-error>
  </mat-form-field>

</qos-form-dialog>
