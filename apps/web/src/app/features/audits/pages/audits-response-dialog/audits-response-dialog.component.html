<h2 mat-dialog-title>Réponse à la question</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="response-form">
  <mat-dialog-content>
    <p class="question-block">
      <span class="clause" *ngIf="data.clauseRef">{{ data.clauseRef }}</span>
      <strong>{{ data.question }}</strong>
    </p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Réponse / Observation (optionnel)</mat-label>
      <textarea matInput formControlName="response" rows="3"
                placeholder="Ce que tu as observé sur le terrain, références aux preuves rassemblées…"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Conformité</mat-label>
      <mat-select formControlName="conformant" required>
        <mat-option [value]="true">Conforme</mat-option>
        <mat-option [value]="false">Non conforme</mat-option>
      </mat-select>
      <mat-error *ngIf="form.controls.conformant.hasError('required')">Choisis Conforme ou NC.</mat-error>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit"
            [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
