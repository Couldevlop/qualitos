<qos-form-dialog
  title="Nouveau plan d'audit"
  subtitle="Définis le périmètre, le type et la date de l'audit. La checklist et les findings seront ajoutés ensuite."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Créer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <mat-form-field appearance="outline" class="full">
    <mat-label>Titre</mat-label>
    <input matInput formControlName="title" maxlength="255" required
           placeholder="Ex. : Audit interne ISO 9001 §9.2">
    <mat-error *ngIf="form.controls.title.hasError('required')">Le titre est requis.</mat-error>
    <mat-error *ngIf="form.controls.title.hasError('maxlength')">255 caractères maximum.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Périmètre (optionnel)</mat-label>
    <textarea matInput formControlName="scope" rows="3"
              placeholder="Processus, sites, périodes couverts par l'audit…"></textarea>
  </mat-form-field>

  <div class="row">
    <mat-form-field appearance="outline" class="col">
      <mat-label>Type</mat-label>
      <mat-select formControlName="type">
        <mat-option *ngFor="let t of types" [value]="t.value">{{ t.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="col">
      <mat-label>Norme (optionnel)</mat-label>
      <input matInput formControlName="standard" maxlength="100"
             placeholder="Ex. : ISO_9001, IATF_16949, ISO_27001">
    </mat-form-field>
  </div>

  <mat-form-field appearance="outline" class="full">
    <mat-label>Date prévue (optionnel)</mat-label>
    <input matInput formControlName="scheduledDate" type="date">
  </mat-form-field>

</qos-form-dialog>
