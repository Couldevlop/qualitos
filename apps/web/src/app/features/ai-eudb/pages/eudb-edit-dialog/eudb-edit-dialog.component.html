<h2 mat-dialog-title>Éditer le brouillon</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="edt-form">
  <mat-dialog-content>
    <p class="hint">Édition autorisée uniquement en statut DRAFT.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nom du fournisseur</mat-label>
      <input matInput formControlName="providerEntityName" maxlength="250">
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Représentant UE</mat-label>
      <input matInput formControlName="providerEuRepresentative" maxlength="250">
    </mat-form-field>
    <div class="row">
      <mat-form-field appearance="outline" class="col-3">
        <mat-label>État membre (α-2)</mat-label>
        <input matInput formControlName="memberStateOfReference" maxlength="2"
               style="text-transform: uppercase;">
      </mat-form-field>
      <mat-form-field appearance="outline" class="col-grow">
        <mat-label>Ref. documentation technique</mat-label>
        <input matInput formControlName="technicalDocumentationReference" maxlength="250">
      </mat-form-field>
    </div>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Résumé de la finalité prévue</mat-label>
      <textarea matInput formControlName="intendedPurposeSummary" rows="4" maxlength="4000"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">save</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
