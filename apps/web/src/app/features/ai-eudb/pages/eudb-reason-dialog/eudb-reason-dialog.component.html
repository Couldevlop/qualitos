<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Confirmer"
  i18n-submitLabel="@@common.confirm"
  [submitIcon]="data.mode === 'REJECT' ? 'block' : 'archive'"
  submitColor="warn"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="warn-note"><strong>{{ hint }}</strong></p>

  <mat-form-field appearance="outline" class="full">
    <mat-label i18n="@@ai-eudb.reason.motive">Motif</mat-label>
    <textarea matInput formControlName="reason" rows="5" maxlength="2000" required></textarea>
  </mat-form-field>

</qos-form-dialog>
