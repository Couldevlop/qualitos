<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  [submitColor]="data.mode === 'REJECT' ? 'warn' : 'primary'"
  [submitIcon]="data.mode === 'CLOSE' ? 'check_circle' : 'block'"
  i18n-submitLabel="@@common.confirm"
  submitLabel="Confirmer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="hint" [class.warn]="data.mode === 'REJECT'">
    <ng-container *ngIf="data.mode === 'CLOSE'">
      <span i18n="@@breach.text.close-hint">Clôture terminale. La violation reste consultable mais ne peut plus changer d'état.</span>
    </ng-container>
    <ng-container *ngIf="data.mode === 'REJECT'">
      <span i18n="@@breach.text.reject-hint">Rejet terminal. Utilise pour un faux positif, un doublon, ou un événement non-RGPD.</span>
    </ng-container>
  </p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>{{ data.mode === 'CLOSE' ? closeLabel : rejectLabel }}</mat-label>
    <textarea matInput formControlName="text" rows="5"
              [attr.maxlength]="data.mode === 'CLOSE' ? 4000 : 2000"
              [required]="data.mode === 'REJECT'"></textarea>
  </mat-form-field>

</qos-form-dialog>
