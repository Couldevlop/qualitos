<qos-form-dialog
  title="Endiguer la violation"
  subtitle="Décrire les mesures de containment appliquées. La violation passe en statut CONTAINED."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Endiguer"
  (submitted)="submit()"
  (cancelled)="cancel()">
<mat-form-field appearance="outline" class="full">
      <mat-label>Mesures de containment</mat-label>
      <textarea matInput formControlName="containmentMeasures" rows="6" maxlength="4000" required></textarea>
    </mat-form-field>

</qos-form-dialog>
