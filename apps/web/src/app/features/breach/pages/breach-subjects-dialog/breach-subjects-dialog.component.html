<h2 mat-dialog-title>Notifier les personnes concernées (Art. 34)</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="sub-form">
  <mat-dialog-content>
    <p class="hint">Notification requise lorsque la violation est susceptible d'engendrer un
       <strong>risque élevé</strong> pour les droits et libertés des personnes (sévérité HIGH/CRITICAL).</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Date / heure de notification</mat-label>
      <input matInput type="datetime-local" formControlName="notifiedAt" required>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Canal de notification</mat-label>
      <input matInput formControlName="channel" maxlength="250" required
             placeholder="Email individuel + courrier postal recommandé">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">mail</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
