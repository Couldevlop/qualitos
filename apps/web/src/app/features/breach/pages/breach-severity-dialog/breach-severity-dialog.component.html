<qos-form-dialog
  title="Modifier la sévérité"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Mettre à jour"
  (submitted)="submit()"
  (cancelled)="cancel()">

    <p class="hint" [class.warn]="willEnableSubjects()">
      <ng-container *ngIf="willEnableSubjects()">
        <strong>Attention :</strong> passer en HIGH/CRITICAL active l'obligation de
        notifier les personnes concernées (Art. 34).
      </ng-container>
      <ng-container *ngIf="!willEnableSubjects()">
        Sévérité courante : <strong>{{ data.current }}</strong>.
      </ng-container>
    </p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nouvelle sévérité</mat-label>
      <mat-select formControlName="severity" required>
        <mat-option *ngFor="let s of severities" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>

</qos-form-dialog>
