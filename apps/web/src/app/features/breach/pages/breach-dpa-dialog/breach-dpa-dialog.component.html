<h2 mat-dialog-title>Notifier la CNIL (Art. 33)</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="dpa-form">
  <mat-dialog-content>
    <p class="hint">Délai légal : 72h depuis la détection de la violation (Art. 33§1 RGPD).</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Date / heure de notification</mat-label>
      <input matInput type="datetime-local" formControlName="notifiedAt" required>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Référence CNIL</mat-label>
      <input matInput formControlName="reference" maxlength="250" required
             placeholder="CNIL-NOT-2026-XXXXX">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">send</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
