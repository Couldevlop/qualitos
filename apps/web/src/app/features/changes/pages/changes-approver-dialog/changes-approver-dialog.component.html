<h2 mat-dialog-title>Ajouter un approbateur</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="app-form">
  <mat-dialog-content>
    <p class="hint">Le workflow d'approbation passe en APPROVED quand tous les approbateurs ont
       statué favorablement. Un seul REJECT marque la demande comme REJECTED.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>UUID approbateur</mat-label>
      <input matInput formControlName="approverUserId" required
             placeholder="00000000-0000-0000-0000-000000000000">
      <mat-hint>UUID v4 de l'utilisateur Keycloak</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Niveau d'approbation</mat-label>
      <input matInput formControlName="approvalLevel" type="number" min="1">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Ajouter
    </button>
  </mat-dialog-actions>
</form>
