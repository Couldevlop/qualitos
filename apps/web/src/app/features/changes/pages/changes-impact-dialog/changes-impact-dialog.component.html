<h2 mat-dialog-title>Ajouter un impact</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="imp-form">
  <mat-dialog-content>
    <p class="hint">Décrivez les entités QualitOS impactées par ce changement (document à mettre à jour,
       parcours de formation à actualiser, équipement à recalibrer…).</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Type d'entité impactée</mat-label>
      <mat-select formControlName="targetType" required>
        <mat-option *ngFor="let t of targetTypes" [value]="t.value">{{ t.label }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>UUID de l'entité</mat-label>
      <input matInput formControlName="targetId" required
             placeholder="00000000-0000-0000-0000-000000000000">
    </mat-form-field>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Notes</mat-label>
      <textarea matInput formControlName="notes" rows="3" maxlength="1000"></textarea>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">check</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Ajouter
    </button>
  </mat-dialog-actions>
</form>
