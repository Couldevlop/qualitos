<div class="editor-shell" *ngIf="!loading && layout; else loadingTpl">
  <header class="editor-header">
    <div class="title-row">
      <button mat-icon-button (click)="back()"
              aria-label="Retour à la liste" i18n-aria-label="@@dbb.editor.back">
        <mat-icon>arrow_back</mat-icon>
      </button>

      <mat-form-field appearance="outline" class="name-field">
        <mat-label i18n="@@dbb.editor.name">Nom du tableau de bord</mat-label>
        <input matInput [value]="layout.name"
               (input)="onNameChange($any($event.target).value)"
               maxlength="120" required />
      </mat-form-field>

      <button mat-stroked-button color="primary"
              [class.shared-active]="layout.shared"
              (click)="onSharedChange(!layout.shared)">
        <mat-icon>{{ layout.shared ? 'group' : 'lock' }}</mat-icon>
        <span *ngIf="layout.shared" i18n="@@dbb.editor.shared">Partagé</span>
        <span *ngIf="!layout.shared" i18n="@@dbb.editor.private">Privé</span>
      </button>

      <span class="spacer"></span>

      <button mat-flat-button color="primary"
              [disabled]="saving" (click)="save()" class="save-btn">
        <mat-icon *ngIf="!saving">save</mat-icon>
        <mat-progress-spinner *ngIf="saving" diameter="18" mode="indeterminate"></mat-progress-spinner>
        <span *ngIf="!saving" i18n="@@dbb.editor.save">Enregistrer</span>
        <span *ngIf="saving" i18n="@@dbb.editor.saving">Enregistrement…</span>
      </button>
    </div>
  </header>

  <div class="editor-body">
    <!-- Palette de widgets (drag &amp; drop §7.3) -->
    <aside class="palette" role="toolbar"
           aria-label="Palette de widgets" i18n-aria-label="@@dbb.palette.aria">
      <span class="palette-label" i18n="@@dbb.palette.label">Glisser un widget</span>
      <button *ngFor="let e of palette; trackBy: trackByEntry"
              class="palette-item"
              draggable="true"
              (dragstart)="onPaletteDragStart($event, e)"
              (dragend)="onPaletteDragEnd()"
              (click)="addWidget(e.type)"
              [matTooltip]="e.description"
              [attr.aria-label]="e.label">
        <mat-icon>{{ e.icon }}</mat-icon>
        <span class="palette-item-label">{{ e.label }}</span>
      </button>
    </aside>

    <!-- Grille interactive -->
    <section class="grid-region"
             aria-label="Zone de composition du tableau de bord"
             i18n-aria-label="@@dbb.grid.aria">
      <gridster [options]="options" class="qos-gridster">
        <gridster-item *ngFor="let item of items; trackBy: trackByItem"
                       [item]="item"
                       class="grid-item"
                       [class.selected]="selected?.id === item.widget.id">
          <div class="item-toolbar">
            <button mat-icon-button class="drag-handle"
                    [attr.aria-label]="'Déplacer ' + item.widget.title"
                    matTooltip="Déplacer" i18n-matTooltip="@@dbb.item.move">
              <mat-icon>drag_indicator</mat-icon>
            </button>
            <span class="item-spacer"></span>
            <button mat-icon-button (click)="select(item)"
                    [attr.aria-label]="'Configurer ' + item.widget.title"
                    matTooltip="Configurer" i18n-matTooltip="@@dbb.item.config">
              <mat-icon>tune</mat-icon>
            </button>
            <button mat-icon-button (click)="removeWidget(item.widget.id)"
                    [attr.aria-label]="'Supprimer ' + item.widget.title"
                    matTooltip="Supprimer" i18n-matTooltip="@@dbb.item.remove">
              <mat-icon>close</mat-icon>
            </button>
          </div>
          <qos-widget-host class="item-content"
                           [widget]="item.widget"
                           [editing]="true"></qos-widget-host>
        </gridster-item>
      </gridster>

      <div class="empty-state" *ngIf="items.length === 0">
        <mat-icon>dashboard_customize</mat-icon>
        <p i18n="@@dbb.empty.hint">
          Votre tableau de bord est vide. Glissez un widget depuis la palette,
          ou cliquez dessus pour l'ajouter.
        </p>
      </div>
    </section>

    <!-- Panneau de configuration -->
    <qos-widget-config-panel class="config-region"
                             *ngIf="selected"
                             [widget]="selected"
                             (widgetChange)="onWidgetConfigured($event)"
                             (removed)="removeWidget($event)"
                             (closed)="closeConfig()"></qos-widget-config-panel>
  </div>
</div>

<ng-template #loadingTpl>
  <div class="loading">
    <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
  </div>
</ng-template>
