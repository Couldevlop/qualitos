<section class="list-shell">
  <header class="list-header">
    <div>
      <h1>Custom dashboards</h1>
      <p>Compose and share dashboards across your tenant — drag, drop, save.</p>
    </div>
    <button mat-flat-button color="primary" (click)="create()">
      <mat-icon>add</mat-icon>
      New dashboard
    </button>
  </header>

  <ng-container *ngIf="layouts$ | async as layouts; else loadingTpl">
    <div class="cards" *ngIf="layouts.length > 0; else emptyTpl">
      <button *ngFor="let l of layouts" class="card" (click)="open(l)" type="button">
        <header class="card-head">
          <mat-icon class="card-icon">dashboard</mat-icon>
          <span class="card-title">{{ l.name }}</span>
          <span class="card-badge" *ngIf="l.shared">SHARED</span>
        </header>
        <p class="card-desc">{{ l.description || 'No description' }}</p>
        <footer class="card-foot">
          <span>{{ l.widgets.length }} widget{{ l.widgets.length === 1 ? '' : 's' }}</span>
          <span>v{{ l.version }}</span>
        </footer>
      </button>
    </div>

    <ng-template #emptyTpl>
      <div class="empty">
        <mat-icon>insights</mat-icon>
        <h2>No custom dashboards yet</h2>
        <p>Create your first dashboard and pin the KPIs that matter to your tenant.</p>
        <button mat-flat-button color="primary" (click)="create()">
          <mat-icon>add</mat-icon>Create dashboard
        </button>
      </div>
    </ng-template>
  </ng-container>

  <ng-template #loadingTpl>
    <div class="loading">
      <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
    </div>
  </ng-template>
</section>
