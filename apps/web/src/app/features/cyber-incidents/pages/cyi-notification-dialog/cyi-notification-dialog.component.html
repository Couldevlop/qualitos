<h2 mat-dialog-title>{{ title }}</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="ntf-form">
  <mat-dialog-content>
    <p class="hint">{{ hint }}</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Date / heure d'envoi</mat-label>
      <input matInput type="datetime-local" formControlName="sentAt" required>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Référence de la notification CSIRT</mat-label>
      <input matInput formControlName="reference" maxlength="250" required
             placeholder="CSIRT-FR-2026-INC-XXX">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">send</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Enregistrer
    </button>
  </mat-dialog-actions>
</form>
