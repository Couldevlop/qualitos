<h2 mat-dialog-title>Modifier la sévérité</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="sev-form">
  <mat-dialog-content>
    <p class="hint" [class.warn]="willEnableNotif()">
      <ng-container *ngIf="willEnableNotif()">
        <strong>Attention :</strong> passer en HIGH/CRITICAL active automatiquement les
        échéances CSIRT NIS 2 (24h / 72h / 1 mois) à compter de la date de détection.
      </ng-container>
      <ng-container *ngIf="!willEnableNotif()">
        Sévérité courante : <strong>{{ data.current }}</strong>.
      </ng-container>
    </p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>Nouvelle sévérité</mat-label>
      <mat-select formControlName="severity" required>
        <mat-option *ngFor="let s of severities" [value]="s">{{ s }}</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">edit</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Mettre à jour
    </button>
  </mat-dialog-actions>
</form>
