<h2 mat-dialog-title>Lier une violation RGPD</h2>

<form [formGroup]="form" (ngSubmit)="submit()" class="lnk-form">
  <mat-dialog-content>
    <p class="hint">Lier ce cyber-incident à une violation de données personnelles
       (RGPD Art. 33-34). Renseignez l'UUID de la violation.</p>

    <mat-form-field appearance="outline" class="full">
      <mat-label>UUID violation</mat-label>
      <input matInput formControlName="breachId" required
             placeholder="00000000-0000-0000-0000-000000000000">
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancel()" [disabled]="submitting">Annuler</button>
    <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || submitting">
      <mat-icon *ngIf="!submitting">link</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      Lier
    </button>
  </mat-dialog-actions>
</form>
