<qos-form-dialog
  title="Lier une violation RGPD"
  subtitle="Lier ce cyber-incident à une violation de données personnelles (RGPD Art. 33-34). Renseignez l'UUID de la violation."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Lier"
  (submitted)="submit()"
  (cancelled)="cancel()">
<mat-form-field appearance="outline" class="full">
      <mat-label>UUID violation</mat-label>
      <input matInput formControlName="breachId" required
             placeholder="00000000-0000-0000-0000-000000000000">
    </mat-form-field>

</qos-form-dialog>
