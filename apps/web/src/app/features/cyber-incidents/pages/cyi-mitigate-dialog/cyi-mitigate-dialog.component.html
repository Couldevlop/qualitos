<qos-form-dialog
  title="Endiguer l'incident"
  subtitle="Décrire les mesures de containment appliquées et l'impact constaté. L'incident passe en statut MITIGATED."
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  submitLabel="Endiguer"
  (submitted)="submit()"
  (cancelled)="cancel()">
<mat-form-field appearance="outline" class="full">
      <mat-label>Mesures de containment</mat-label>
      <textarea matInput formControlName="containmentMeasures" rows="5" maxlength="4000" required></textarea>
    </mat-form-field>
    <mat-form-field appearance="outline" class="full">
      <mat-label>Impact constaté (optionnel)</mat-label>
      <textarea matInput formControlName="impactDescription" rows="4" maxlength="4000"></textarea>
    </mat-form-field>

</qos-form-dialog>
