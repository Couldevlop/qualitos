<qos-form-dialog
  [title]="title"
  [formGroup]="form"
  [submitting]="submitting"
  [submitDisabled]="form.invalid"
  [submitColor]="data.mode === 'REJECT' ? 'warn' : 'primary'"
  [submitIcon]="data.mode === 'CLOSE' ? 'check_circle' : 'block'"
  submitLabel="Confirmer"
  (submitted)="submit()"
  (cancelled)="cancel()">

  <p class="hint" [class.warn]="data.mode === 'REJECT'">{{ hint }}</p>

  <mat-form-field appearance="outline" class="full">
    <mat-label>{{ data.mode === 'CLOSE' ? 'Notes de clôture (optionnel)' : 'Motif du rejet' }}</mat-label>
    <textarea matInput formControlName="text" rows="5"
              [attr.maxlength]="data.mode === 'CLOSE' ? 4000 : 2000"
              [required]="data.mode === 'REJECT'"></textarea>
  </mat-form-field>

</qos-form-dialog>
