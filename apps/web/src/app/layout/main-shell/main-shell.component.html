<div class="qos-shell" [class.qos-shell--collapsed]="collapsed">

  <aside class="qos-sidebar" aria-label="Navigation principale" i18n-aria-label="@@shell.nav.aria">
    <div class="qos-sidebar__brand">
      <span class="qos-sidebar__logo material-symbols-outlined" aria-hidden="true">
        workspace_premium
      </span>
      <div class="qos-sidebar__brand-text" *ngIf="!collapsed">
        <strong>QualitOS</strong>
        <small>Quality OS</small>
      </div>
    </div>

    <nav class="qos-sidebar__nav">
      <ng-container *ngFor="let section of sections">
        <!-- En-tête de section : bouton repliable (GRC) ou simple libellé -->
        <ng-container *ngIf="!collapsed">
          <button
            *ngIf="section.collapsible; else staticLabel"
            type="button"
            class="qos-sidebar__section-toggle"
            (click)="toggleSection(section.label)"
            [attr.aria-expanded]="!isSectionCollapsed(section.label)">
            <span class="qos-sidebar__section-label">{{ section.label }}</span>
            <span
              class="qos-sidebar__section-chevron material-symbols-outlined"
              [class.qos-sidebar__section-chevron--open]="!isSectionCollapsed(section.label)"
              aria-hidden="true">expand_more</span>
          </button>
          <ng-template #staticLabel>
            <div class="qos-sidebar__section-label">{{ section.label }}</div>
          </ng-template>
        </ng-container>

        <ul
          class="qos-sidebar__items"
          *ngIf="collapsed || !isSectionCollapsed(section.label)">
          <li *ngFor="let item of section.items">
            <a
              [routerLink]="item.route"
              routerLinkActive="qos-sidebar__link--active"
              class="qos-sidebar__link"
              [title]="collapsed ? item.label : null">
              <span class="qos-sidebar__icon material-symbols-outlined" aria-hidden="true">
                {{ item.icon }}
              </span>
              <span class="qos-sidebar__label" *ngIf="!collapsed">{{ item.label }}</span>
              <span
                *ngIf="item.badge && !collapsed"
                class="qos-sidebar__badge">{{ item.badge }}</span>
            </a>
          </li>
        </ul>
      </ng-container>
    </nav>

    <div class="qos-sidebar__footer">
      <button
        type="button"
        class="qos-sidebar__collapse"
        (click)="toggle()"
        [attr.aria-label]="collapsed ? expandNavLabel : collapseNavLabel"
        [attr.aria-expanded]="!collapsed">
        <span class="material-symbols-outlined" aria-hidden="true">
          {{ collapsed ? 'chevron_right' : 'chevron_left' }}
        </span>
        <span class="qos-sidebar__collapse-text" *ngIf="!collapsed" i18n="@@shell.collapse">Replier</span>
      </button>
    </div>
  </aside>

  <div class="qos-shell__main">
    <header class="qos-topbar">
      <button
        type="button"
        class="qos-topbar__icon-btn qos-topbar__menu"
        (click)="toggle()"
        aria-label="Basculer la navigation"
        i18n-aria-label="@@shell.toggle-nav.aria">
        <span class="material-symbols-outlined" aria-hidden="true">menu</span>
      </button>

      <div class="qos-topbar__search">
        <span class="material-symbols-outlined qos-topbar__search-icon" aria-hidden="true">search</span>
        <input
          type="search"
          class="qos-topbar__search-input"
          placeholder="Rechercher : modules, normes, KPI, documents…"
          i18n-placeholder="@@shell.search.placeholder"
          aria-label="Recherche globale"
          i18n-aria-label="@@shell.search.aria">
        <kbd class="qos-topbar__kbd">⌘K</kbd>
      </div>

      <div class="qos-topbar__actions">
        <!-- Synchro offline (§15.2-15.3) : visible hors-ligne ou si des actions
             terrain attendent leur rejeu. Cliquable → page « File d'attente ». -->
        <ng-container *ngIf="{ online: online$ | async, pending: pendingSync$ | async } as sync">
          <a
            *ngIf="sync.online === false || (sync.pending ?? 0) > 0"
            routerLink="/offline-queue"
            class="qos-topbar__sync"
            [class.qos-topbar__sync--offline]="sync.online === false"
            role="status"
            [attr.aria-label]="sync.online === false
              ? 'Hors-ligne — ' + (sync.pending ?? 0) + ' action(s) en attente'
              : (sync.pending ?? 0) + ' action(s) en attente de synchronisation'">
            <span class="material-symbols-outlined" aria-hidden="true">
              {{ sync.online === false ? 'cloud_off' : 'cloud_sync' }}
            </span>
            <span class="qos-topbar__sync-count" *ngIf="(sync.pending ?? 0) > 0">
              {{ sync.pending }}
            </span>
          </a>
        </ng-container>

        <qos-theme-toggle></qos-theme-toggle>

        <button type="button" class="qos-topbar__icon-btn"
                aria-label="Notifications" i18n-aria-label="@@shell.notifications.aria">
          <span class="material-symbols-outlined" aria-hidden="true">notifications</span>
          <span class="qos-topbar__dot" aria-hidden="true"></span>
        </button>

        <ng-container *ngIf="user$ | async as user">
          <button type="button" class="qos-topbar__user" [attr.aria-label]="'Profil ' + user.displayName">
            <span class="qos-topbar__avatar">{{ initials(user.displayName) }}</span>
            <span class="qos-topbar__user-name">{{ user.displayName }}</span>
            <span class="material-symbols-outlined qos-topbar__user-caret" aria-hidden="true">
              expand_more
            </span>
          </button>
        </ng-container>
      </div>
    </header>

    <main class="qos-shell__content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
