<h2 mat-dialog-title>{{ title }}</h2>

<form [formGroup]="formGroup" (ngSubmit)="submitted.emit()">
  <mat-dialog-content>
    <p class="qfd-subtitle" *ngIf="subtitle">{{ subtitle }}</p>
    <ng-content></ng-content>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="cancelled.emit()" [disabled]="submitting">
      {{ cancelLabel }}
    </button>
    <button mat-flat-button [color]="submitColor" type="submit" [disabled]="submitDisabled || submitting">
      <mat-icon *ngIf="!submitting" aria-hidden="true">{{ submitIcon }}</mat-icon>
      <mat-progress-spinner *ngIf="submitting" mode="indeterminate" diameter="18"></mat-progress-spinner>
      {{ submitLabel }}
    </button>
  </mat-dialog-actions>
</form>
