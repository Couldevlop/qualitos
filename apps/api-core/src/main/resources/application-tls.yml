# Profil "tls" — terminaison TLS 1.3 hybride post-quantique au niveau de l'app
# (Mode B, ADR 0015 ; CLAUDE.md §11.4 « TLS hybride X25519 + ML-KEM-768 »).
#
# OFF PAR DÉFAUT. api-core ne charge ce fichier QUE si le profil "tls" est actif :
#     java -jar api-core.jar --spring.profiles.active=tls
#   ou  SPRING_PROFILES_ACTIVE=tls
#
# Pré-requis (gérés par HybridTlsConfig, chargé sous ce même profil) :
#   1. Deps : org.bouncycastle:bctls-jdk18on (dev) ou bctls-fips (prod régulée).
#   2. Providers BC-JSSE / BC enregistrés au démarrage (HybridTlsConfig.@PostConstruct).
#   3. Groupe hybride activé via jdk.tls.namedGroups=X25519MLKEM768,X25519
#      (positionné par HybridTlsConfig si non fourni en -D).
#
# Le keystore et son mot de passe ne sont PAS versionnés : ils proviennent de
# l'environnement (Vault / ESO en prod) — cf. règle 18.2 §3.
server:
  port: ${TLS_PORT:8443}
  ssl:
    enabled: true
    protocol: TLS
    enabled-protocols: TLSv1.3
    # Provider JSSE Bouncy Castle (PQ) — pas le SunJSSE (qui ignore X25519MLKEM768).
    provider: BCJSSE
    key-store: ${TLS_KEYSTORE_PATH:classpath:tls/keystore.p12}
    key-store-type: PKCS12
    key-store-password: ${TLS_KEYSTORE_PASSWORD}
    key-alias: ${TLS_KEY_ALIAS:qualitos}
