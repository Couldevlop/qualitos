# Reverse-proxy nginx + oqs-provider terminant le TLS hybride post-quantique
# devant l'API Gateway QualitOS (WS5, ADR 0015). Référence — à valider en infra.
#
# Pré-requis : nginx lié à OpenSSL 3.x avec oqs-provider chargé
#   (openssl.cnf : [provider_sect] oqsprovider = oqs_module ... activate = 1).
# Groupe hybride : X25519MLKEM768 (+ repli X25519 pour clients non-PQ).

events {}

http {
    server {
        listen 443 ssl;
        http2 on;
        server_name qualitos.example.com;

        ssl_certificate     /etc/nginx/tls/server.crt;
        ssl_certificate_key /etc/nginx/tls/server.key;

        ssl_protocols TLSv1.3;
        # Ordre = préférence : hybride PQ d'abord, repli classique ensuite.
        ssl_ecdh_curve X25519MLKEM768:X25519;
        ssl_prefer_server_ciphers off;

        # En-têtes de sécurité (cohérent avec le durcissement OWASP de l'engine).
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        location / {
            proxy_pass http://api-gateway:8080;   # API Gateway / quality-engine en aval (mTLS Istio)
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
