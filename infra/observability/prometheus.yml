# QualitOS — configuration Prometheus dev (profil compose 'observability').
# Scrape les /actuator/prometheus des services Spring Boot via le réseau interne.
# En prod (K8s) ce fichier est remplacé par le ServiceMonitor du Helm chart.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/qualitos-alerts.yml

scrape_configs:
  - job_name: api-quality-engine
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-quality-engine:8082"]

  - job_name: api-core
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-core:8081"]

  - job_name: api-iot-hub
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["api-iot-hub:8083"]

  # Keycloak 25 : KC_METRICS_ENABLED=true expose /metrics sur le port de
  # management 9000 (interne au réseau compose).
  - job_name: keycloak
    metrics_path: /metrics
    static_configs:
      - targets: ["keycloak:9000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
