{{- if .Values.networkPolicy.enabled }}
# Zero-trust réseau (§11) : default-deny en ingress sur tout le namespace,
# puis autorisation du trafic intra-namespace + ingress-controller.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qualitos-default-deny-ingress
  labels:
    {{- include "qualitos.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qualitos-allow-intra-namespace
  labels:
    {{- include "qualitos.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qualitos-allow-ingress-controller
  labels:
    {{- include "qualitos.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
{{- end }}
