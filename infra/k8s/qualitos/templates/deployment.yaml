{{- /*
Un Deployment par entrée .Values.services (enabled=true).
Sécurité (§11, CIS K8s) : runAsNonRoot, rootfs read-only, capabilities drop ALL,
seccomp RuntimeDefault. Les images distroless du repo sont déjà non-root.
Probes : actuator liveness/readiness pour Spring Boot, healthPath sinon.
*/}}
{{- range $name, $svc := .Values.services }}
{{- if $svc.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    {{- include "qualitos.labels" $ | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        {{- include "qualitos.labels" $ | nindent 8 }}
      {{- if and $.Values.prometheus.scrapeAnnotations (or $svc.isSpringBoot $svc.metricsPath) }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ $svc.port | quote }}
        prometheus.io/path: {{ $svc.metricsPath | default (ternary "/actuator/prometheus" "/metrics" ($svc.isSpringBoot | default false)) | quote }}
      {{- end }}
    spec:
      serviceAccountName: {{ $.Values.serviceAccount.name }}
      automountServiceAccountToken: false
      {{- with $.Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ $name }}
          image: {{ include "qualitos.image" (dict "root" $ "svc" $svc) }}
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - name: http
              containerPort: {{ $svc.port }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ $svc.readOnlyRootFilesystem | default true }}
            capabilities:
              drop: ["ALL"]
          env:
            {{- if $svc.isSpringBoot }}
            - name: SPRING_PROFILES_ACTIVE
              value: {{ $svc.springProfiles | default $.Values.global.springProfiles | quote }}
            - name: KEYCLOAK_URL
              value: {{ $.Values.global.keycloak.url | quote }}
            - name: KEYCLOAK_REALM
              value: {{ $.Values.global.keycloak.realm | quote }}
            - name: KEYCLOAK_ISSUER_URI
              value: "{{ $.Values.global.keycloak.url }}/realms/{{ $.Values.global.keycloak.realm }}"
            {{- end }}
            {{- range $k, $v := $svc.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          {{- if $svc.secretRef }}
          envFrom:
            # Secret matérialisé par External Secrets Operator depuis Vault (§18.2.3).
            - secretRef:
                name: {{ $svc.secretRef }}
          {{- end }}
          {{- if $svc.isSpringBoot }}
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          {{- else }}
          livenessProbe:
            httpGet:
              path: {{ $svc.healthPath | default "/health" }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ $svc.healthPath | default "/health" }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          resources:
            {{- toYaml ($svc.resources | default dict) | nindent 12 }}
          {{- if $svc.isSpringBoot }}
          volumeMounts:
            # rootfs read-only : /tmp inscriptible requis par la JVM.
            - name: tmp
              mountPath: /tmp
          {{- end }}
      {{- if $svc.isSpringBoot }}
      volumes:
        - name: tmp
          emptyDir: {}
      {{- end }}
{{- end }}
{{- end }}
