# Broker MQTT de l'Edge Gateway — Deployment K3s (multi-arch ARM64/x86, §9.5).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mosquitto-data
  namespace: qualitos-edge
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      # Tampon store-and-forward 24-72 h — dimensionner selon la densité capteurs.
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mosquitto
  namespace: qualitos-edge
  labels:
    app.kubernetes.io/name: mosquitto
    app.kubernetes.io/part-of: qualitos-edge
spec:
  replicas: 1
  strategy:
    type: Recreate   # PVC RWO — pas de rolling sur un nœud edge unique.
  selector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/part-of: qualitos-edge
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1883
        fsGroup: 1883
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mosquitto
          image: eclipse-mosquitto:2.0.20
          ports:
            - name: mqtt
              containerPort: 1883
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /mosquitto/config
              readOnly: true
            - name: data
              mountPath: /mosquitto/data
            - name: certs
              mountPath: /mosquitto/certs
              readOnly: true
            - name: secrets
              mountPath: /mosquitto/secrets
              readOnly: true
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 500m, memory: 256Mi }
          livenessProbe:
            tcpSocket: { port: mqtt }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket: { port: mqtt }
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: mosquitto-config
        - name: data
          persistentVolumeClaim:
            claimName: mosquitto-data
        - name: certs
          secret:
            # Certificat client X.509 du gateway + CA du hub (provisioning §9.6,
            # rotation ≤ 90 j §9.8). Créé par le processus d'enrôlement du site.
            secretName: edge-gateway-mtls
        - name: secrets
          secret:
            # Fichier passwd mosquitto (comptes des capteurs/automates locaux).
            secretName: mosquitto-local-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: qualitos-edge
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mosquitto
  ports:
    - name: mqtt
      port: 1883
      targetPort: mqtt
