# QualitOS — stack dev complète (Postgres + Keycloak + api-core + api-quality-engine + web).
# Usage : docker compose -f docker-compose.dev.yml up --build
# - http://localhost:4200      → frontend Angular
# - http://localhost:8081      → api-core (Swagger /swagger-ui.html)
# - http://localhost:8082      → api-quality-engine (Swagger /swagger-ui.html)
# - http://localhost:8080      → Keycloak admin (admin/admin)
# - localhost:5432 / 5433      → Postgres core / quality
#
# Bascule du frontend en mode 'real API' : éditer apps/web/src/environments/environment.ts
# (useMockApi = false) avant le build, ou reconstruire avec le profil 'web-real'.

services:

  # -------------------------------------------------------------------------
  # Postgres — 2 bases : qualitos_core (api-core) et qualitos_quality (engine).
  # En dev on partage 1 cluster, 2 databases. En prod chaque service aura son
  # propre cluster managé (RDS / Aurora / Cloud SQL).
  # -------------------------------------------------------------------------

  postgres:
    image: postgres:17-alpine
    container_name: qualitos-postgres
    environment:
      POSTGRES_USER: qualitos
      POSTGRES_PASSWORD: qualitos
      POSTGRES_MULTIPLE_DATABASES: qualitos_core,qualitos_quality,keycloak
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh:ro
    ports:
      # Host 5432 est occupé par un PostgreSQL natif Windows (postgresql-x64-17).
      # On publie le conteneur sur 5434 pour éviter le conflit. Le réseau interne
      # 'qualitos' (Keycloak, api-*) continue d'utiliser postgres:5432.
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualitos"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # Keycloak — IdP OIDC. Realm 'qualitos' pré-seedé via realm-export.json.
  # En dev on utilise le storage Postgres (au lieu de h2 in-memory) pour
  # garder la config entre restarts.
  # -------------------------------------------------------------------------

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: qualitos-keycloak
    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --http-port=8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: qualitos
      KC_DB_PASSWORD: qualitos
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # Keycloak 25 expose /health/ready uniquement sur le management port 9000
    # (interne, non publié) et le container n'a ni curl ni wget. On vérifie
    # juste que le port 8080 accepte les connexions TCP — `start_period: 60s`
    # laisse le temps au démarrage Quarkus + import de realm avant que les
    # checks comptent.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # api-core — multi-tenant + auth + users (Spring Boot, Java 21).
  # -------------------------------------------------------------------------

  api-core:
    build:
      context: .
      dockerfile: apps/api-core/Dockerfile
    container_name: qualitos-api-core
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/qualitos_core
      DB_USER: qualitos
      DB_PASSWORD: qualitos
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: qualitos
      SPRING_PROFILES_ACTIVE: dev
    ports:
      # Host-side port shifted to 8181 to avoid conflict with a local Apache
      # (httpd.exe Windows service) commonly bound to 8081 on dev machines.
      # Container internal port stays 8081.
      - "8181:8081"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # api-quality-engine — 8 modules métier qualité (Spring Boot, Java 21).
  # -------------------------------------------------------------------------

  api-quality-engine:
    build:
      context: .
      dockerfile: apps/api-quality-engine/Dockerfile
    container_name: qualitos-api-quality-engine
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/qualitos_quality
      DB_USER: qualitos
      DB_PASSWORD: qualitos
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: qualitos
      SPRING_PROFILES_ACTIVE: dev
      # Stockage binaire photos NC (§4.3). OFF par défaut ; passer
      # STORAGE_S3_ENABLED=true (dans .env ou l'environnement) avec le profil
      # compose 'storage' actif pour brancher MinIO. Endpoint/bucket/creds = dev
      # local assumé (allowlistés gitleaks, comme les autres creds du compose).
      STORAGE_S3_ENABLED: ${STORAGE_S3_ENABLED:-false}
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_BUCKET: qualitos-nc-photos
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_ACCESS_KEY: qualitos
      STORAGE_S3_SECRET_KEY: qualitos-dev-secret
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # MinIO — stockage objet S3-compatible (photos de NC, §4.3). Démarré seulement
  # avec le profil compose 'storage' (off par défaut). Creds de DEV LOCAL assumés
  # (qualitos / qualitos-dev-secret) — en prod : S3/MinIO managé via Vault + ESO.
  #   docker compose -f docker-compose.dev.yml --profile storage up -d minio
  #   Console : http://localhost:9001 (qualitos / qualitos-dev-secret)
  # -------------------------------------------------------------------------

  minio:
    image: minio/minio:latest
    container_name: qualitos-minio
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qualitos
      MINIO_ROOT_PASSWORD: qualitos-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [qualitos]

  # Création idempotente du bucket au démarrage (job one-shot via le client mc).
  minio-init:
    image: minio/mc:latest
    container_name: qualitos-minio-init
    profiles: ["storage"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 qualitos qualitos-dev-secret &&
      mc mb --ignore-existing local/qualitos-nc-photos &&
      echo 'bucket qualitos-nc-photos ready';
      "
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # P3 — IoT Hub (Spring Boot, Java 21, distroless). Device registry + telemetry.
  # -------------------------------------------------------------------------

  api-iot-hub:
    build:
      # Contexte racine : le pom hérite de qualitos-parent + dépend de
      # libs/industry-commons (voir l'en-tête du Dockerfile).
      context: .
      dockerfile: apps/api-iot-hub/Dockerfile
    container_name: qualitos-api-iot-hub
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/qualitos_quality
      DB_USER: qualitos
      DB_PASSWORD: qualitos
      KEYCLOAK_URL: http://keycloak:8080
      KEYCLOAK_REALM: qualitos
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # WS4 — blockchain-service : passerelle Hyperledger Fabric (ADR 0012 Phase B).
  # Porte le Fabric Gateway SDK (gRPC/mTLS) et invoque le chaincode qualitos-anchor.
  # Démarré uniquement avec le profil compose 'fabric' (il se connecte au réseau
  # Fabric AU BOOT — inutile sans réseau Fabric joignable). Le matériel MSP (certs,
  # clé, TLS CA) généré par le test-network est monté en lecture seule ; renseigner
  # les chemins via .env. Voir infra/blockchain/README.md.
  # -------------------------------------------------------------------------

  blockchain-service:
    build:
      context: apps/blockchain-service
      dockerfile: Dockerfile
    container_name: qualitos-blockchain-service
    profiles: ["fabric"]
    environment:
      SERVER_PORT: 8090
      FABRIC_PEER_ENDPOINT: ${FABRIC_PEER_ENDPOINT:-host.docker.internal:7051}
      FABRIC_PEER_HOST_ALIAS: ${FABRIC_PEER_HOST_ALIAS:-peer0.org1.example.com}
      FABRIC_TLS_CERT: ${FABRIC_TLS_CERT:-/fabric-msp/peer-tls-ca.crt}
      FABRIC_MSP_ID: ${FABRIC_MSP_ID:-Org1MSP}
      FABRIC_CERT: ${FABRIC_CERT:-/fabric-msp/user-cert.pem}
      FABRIC_KEY: ${FABRIC_KEY:-/fabric-msp/user-key.pem}
      FABRIC_CHANNEL: ${FABRIC_CHANNEL:-qualitos}
      FABRIC_CHAINCODE: ${FABRIC_CHAINCODE:-qualitos-anchor}
    volumes:
      # Monter ici le MSP du test-network (organizations/peerOrganizations/org1...).
      - ${FABRIC_MSP_DIR:-./infra/blockchain/fabric-msp}:/fabric-msp:ro
    ports:
      - "8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # Socle Kafka (CLAUDE.md §10.1 event-driven). Redpanda = API Kafka, mono-binaire,
  # sans Zookeeper (léger pour le dev). Démarré uniquement avec le profil compose
  # 'kafka' (off par défaut). L'engine (host) publie via localhost:9092 (listener
  # external) ; les conteneurs internes via redpanda:29092. Consommé par le relais
  # outbox audit_events (qualitos.kafka.enabled=true côté engine).
  # -------------------------------------------------------------------------

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.7
    container_name: qualitos-redpanda
    profiles: ["kafka"]
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # P5 — AI gateway (FastAPI, distroless). Routes vers Ollama / Anthropic / Mistral
  # via la passerelle AIProvider. Toutes les sorties sont PII-redacted (Presidio).
  # -------------------------------------------------------------------------

  ai-service:
    build:
      context: apps/ai-service
      dockerfile: Dockerfile
    container_name: qualitos-ai-service
    environment:
      QOS_ENV: dev
      QOS_LOG_LEVEL: INFO
      # Dev only : appel serveur-à-serveur depuis api-quality-engine via en-tête
      # X-Dev-Claims (bypass JWT). En prod : OIDC client_credentials aud=qualitos-ai (ADR 0014).
      QOS_DEV_AUTH: "1"
      # Modèle dev actif : qwen2.5-coder:3b (code-tuned, sans SYSTEM baké → plus léger).
      # Les modèles spécialisés qualitos-sql / qualitos-sql-lite (few-shot baké) sont
      # plus précis sur les cas-exemples MAIS leur SYSTEM ajoute ~200 tokens de
      # prompt-eval : sur CPU sans GPU, les requêtes HORS exemples dépassent 240s
      # (mesuré : 247s E2E → 503). Réservés au GPU/marge CPU. §7.3, ADR 0014.
      OLLAMA_MODEL: qwen2.5-coder:3b
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_TIMEOUT_S: "240"
      KEYCLOAK_ISSUER: http://keycloak:8080/realms/qualitos
      KEYCLOAK_AUDIENCE: qualitos-ai
      QDRANT_URL: http://qdrant:6333
      NLQ_READONLY_DSN: postgresql://qualitos_nlq_ro:nlq_ro_pwd@postgres:5432/qualitos_quality
      # Set these in your local .env (never commit):
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      QOS_FEDERATED_OPTIN_TENANTS: ""
    ports:
      - "8085:8085"
    depends_on:
      keycloak:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # P5 — Qdrant vector store (collection-per-tenant for RAG).
  # -------------------------------------------------------------------------

  qdrant:
    image: qdrant/qdrant:v1.11.0
    container_name: qualitos-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # P5 — Ollama local LLM (default provider when no API key is supplied).
  # -------------------------------------------------------------------------

  ollama:
    image: ollama/ollama:0.3.12
    container_name: qualitos-ollama
    environment:
      # Garde le modèle chargé en mémoire (évite le rechargement à froid ~100 s sur CPU).
      OLLAMA_KEEP_ALIVE: "-1"
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # Observabilité (§14) — Prometheus + Grafana, profil compose 'observability'
  # (off par défaut). Scrape les /actuator/prometheus des services Java + les
  # métriques Keycloak (port management 9000). Dashboards provisionnés depuis
  # infra/observability/. Grafana : admin/admin sur http://localhost:3000.
  # -------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: qualitos-prometheus
    profiles: ["observability"]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks: [qualitos]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: qualitos-grafana
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks: [qualitos]

  # -------------------------------------------------------------------------
  # web — frontend Angular servi en statique via nginx.
  # En dev quotidien préférer 'npm start' direct (HMR). Ce service est utile
  # pour les démos end-to-end et la validation prod-like.
  # -------------------------------------------------------------------------

  web:
    build:
      context: apps/web
      dockerfile: Dockerfile
    container_name: qualitos-web
    ports:
      - "4200:80"
    depends_on:
      - api-core
      - api-quality-engine
    networks: [qualitos]

volumes:
  postgres-data:
  qdrant-data:
  ollama-data:
  redpanda-data:
  prometheus-data:
  grafana-data:
  minio-data:

networks:
  qualitos:
    driver: bridge
